<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f8fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    .code {
      font-size: 5rem;
      font-weight: 800;
      color: #e0e4ea;
      line-height: 1;
      letter-spacing: -2px;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 1rem 0 0.75rem;
      color: #222;
    }
    p {
      color: #666;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .divider {
      border: none;
      border-top: 1px solid #eef0f3;
      margin: 2rem 0 1.5rem;
    }
    .footer {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Not Found</h1>
    <p>The requested address is not served by this CDN.</p>
    <hr class="divider">
    <div class="footer">CDN &bull; 404</div>
  </div>
</body>
</html>
