[buildout]
extends = {{ nxdtest_instance }}
parts +=
  publish
  resiliency-exclude-file
  software-web-server
  software-web-server-promise

[slap-configuration]
recipe = slapos.cookbook:slapconfiguration.serialised
computer = ${slap-connection:computer-id}
partition = ${slap-connection:partition-id}
url = ${slap-connection:server-url}
key = ${slap-connection:key-file}
cert = ${slap-connection:cert-file}

[download-source]
recipe = slapos.recipe.build:gitclone
git-executable = {{ git_location }}/bin/git

[slapos]
<= download-source
repository = {{ slapos_location }}

[directory]
recipe = slapos.cookbook:mkdirectory
bin = ${buildout:directory}/bin
etc = ${buildout:directory}/etc
srv = ${buildout:directory}/srv
var = ${buildout:directory}/var
service = ${:etc}/service
plugins = ${:etc}/plugin
log = ${:var}/log
test-working-dir = ${buildout:directory}/tmp
nxdtest-working-dir = ${:var}/nxdtest

[software-web-server]
# Serve the software checkout over HTTP so Software Releases are built from an
# URL, exactly as production consumes them (slapos.testing then sees an URL for
# ${:_profile_base_location_}, not a directory). Supervised, so it stays up for
# the whole test session and a later test's `slapos node software --all` never
# re-installs an earlier Software Release from a dead server.
recipe = slapos.cookbook:simplehttpserver
base-path = {{ slapos_location }}
host = ${slap-configuration:ipv4-random}
port = 9080
url = http://${:host}:${:port}
wrapper = ${directory:service}/software-web-server
log-file = ${directory:log}/software-web-server.log
use-hash-url = false

[software-web-server-promise]
# Fail instantiation unless the server actually accepts connections, so a dead
# software-web-server surfaces here instead of as a later Software Release
# build failing to fetch its profile.
recipe = slapos.cookbook:promise.plugin
eggs = slapos.toolbox
module = slapos.promise.plugin.check_url_available
output = ${directory:plugins}/${:_buildout_section_name_}.py
config-url = ${software-web-server:url}

[slapos-test-runner-nxdtest-environment.sh]
recipe = slapos.recipe.template:jinja2
output = ${directory:etc}/${:_buildout_section_name_}
PATH={{ buildout['bin-directory'] }}:{{ curl_location }}/bin:{{ faketime_location }}/bin:{{ openssl_location }}/bin:/usr/bin:/bin
context =
  section slap slap-configuration
  key ipv6_random slap-configuration:ipv6-random
{%- raw %}
inline =
  export PATH=${:PATH}
  export SLAPOS_TEST_IPV4=${slap-configuration:ipv4-random}
  export SLAPOS_TEST_IPV6={{ slap.get('ipv6-range-network') or ipv6_random }}
  export SLAPOS_TEST_WORKING_DIR=${directory:test-working-dir}
  export SLAPOS_TEST_SOFTWARE_ROOT_URL=${software-web-server:url}
  export SLAPOS_TEST_SOFTWARE_ROOT_DIR=${software-web-server:base-path}
{%- endraw %}


[slapos-test-runner-dot-nxdtest]
recipe = slapos.recipe.template:jinja2
output = ${:workdir}/.nxdtest
workdir = ${directory:nxdtest-working-dir}
tests = {{ tests | indent(2) }}
inline =
  {% raw %}
  import os
  {%- set dependency_track_url = slapparameter_dict.get('sbom', {}).get('dependency-track-url') or '' %}
  {%- set dependency_track_api_key = slapparameter_dict.get('sbom', {}).get('dependency-track-api-key') %}
  {%- set sbom_projects = slapparameter_dict.get('sbom', {}).get('projects', {}) %}
  {%- set only_sr = slapparameter_dict.get('only-sr') %}
  {%- if only_sr and not isinstance(only_sr, list) %}
  {%-   set only_sr = [only_sr] %}
  {%- endif %}
  {%- set unittest_args = slapparameter_dict.get('unittest-args', ['discover', '-v']) %}
  {%- if not isinstance(unittest_args, list) %}
  {%-   set unittest_args = [unittest_args] %}
  {%- endif %}
  command = {{ repr([interpreter, '-m', 'unittest'] + unittest_args) }}
  dependency_track_url = {{ repr(dependency_track_url) }}
  dependency_track_api_key = {{ repr(dependency_track_api_key) }}
  TestCase(
    'json-schemas',
    {{ repr([interpreter, '-m', 'unittest', 'slapos/test/test_json_schema.py']) }},
    cwd={{ repr(json_schemas_folder) }},
    summaryf=UnitTest.summary,
  )
  {%- for test in tests.splitlines() %}
  {%-   set name, folder = test.split() %}
  {%-   if not only_sr or name in only_sr %}
  envadj = { 'SLAPOS_SR_TEST_NAME': {{ repr(name) }} }
  if dependency_track_url:
    envadj['SLAPOS_SR_SBOM_DEPENDENCY_TRACK_URL'] = dependency_track_url
    # XXX we do not set it through envadj, so that it does not leak in test logs
    os.environ['SLAPOS_SR_SBOM_DEPENDENCY_TRACK_API_KEY'] = dependency_track_api_key
    dependency_track_project_id = {{ repr(sbom_projects.get(name)) }}
    if dependency_track_project_id:
      envadj['SLAPOS_SR_SBOM_DEPENDENCY_TRACK_PROJECT_ID'] = dependency_track_project_id
  TestCase(
    {{ repr(name) }},
    command,
    cwd={{ repr(folder) }},
    summaryf=UnitTest.summary,
    envadj=envadj,
  )
  {%-   endif %}
  {%- endfor %}
  {%- endraw %}
context =
  key slapparameter_dict slap-configuration:configuration
  key tests :tests
  raw json_schemas_folder {{ json_schemas_folder }}
  raw interpreter {{ interpreter }}

[runTestSuite]
env.sh = ${slapos-test-runner-nxdtest-environment.sh:output}
workdir = ${slapos-test-runner-dot-nxdtest:workdir}

[slapos-local-development-environment.sh]
recipe = slapos.recipe.template
output = ${directory:etc}/${:_buildout_section_name_}
inline =
  source ${slapos-test-runner-nxdtest-environment.sh:output}
  {% set shared_part_list = [] %}
  {% for shared_part in buildout['shared-part-list'].splitlines() -%}
    {% do shared_part_list.append(shared_part) %}
  {%- endfor %}
  export SLAPOS_TEST_SHARED_PART_LIST={{ os.pathsep.join(shared_part_list) }}
  echo "Environment loaded."
  echo "The embedded SlapOS is in $SLAPOS_TEST_WORKING_DIR"
  echo "To work on a test, execute:"
  echo "   SLAPOS_TEST_DEBUG=1 {{ interpreter }} -m unittest discover -v"
  echo "from a folder containing software release test."
  echo "Tip: you may want to also add"
  echo "   SLAPOS_TEST_SKIP_SOFTWARE_REBUILD=1"
  echo "   SLAPOS_TEST_SKIP_SOFTWARE_CHECK=1"
  echo "   SLAPOS_TEST_LOG_DIRECTORY=<some-empty-directory>"
  echo "See https://lab.nexedi.com/nexedi/slapos/-/tree/master/software/slapos-sr-testing"
  echo

[publish]
recipe = slapos.cookbook:publish
environment-script = ${slapos-local-development-environment.sh:output}
software-web-server-url = ${software-web-server:url}

[resiliency-exclude-file]
# We don't want anything saved during resiliency
recipe = slapos.recipe.template
inline = *
output = ${directory:srv}/exporter.exclude
