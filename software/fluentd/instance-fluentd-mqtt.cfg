{% set mqtt_host = slapparameter_dict['mqtt-host'] -%}
{% set mqtt_port = slapparameter_dict['mqtt-port'] -%}
{% set mqtt_topic = slapparameter_dict['mqtt-topic'] -%}
{% set mqtt_ssl_enabled = slapparameter_dict['mqtt-ssl-enabled'] -%}

[fluentd-agent-conf]
recipe = slapos.recipe.template:jinja2
url = {{ template_fluentd_mqtt_conf }}
output = {{ directory['etc'] }}/fluentd-agent.conf
mqtt-host = {{ dumps(mqtt_host) }}
mqtt-port = {{ dumps(mqtt_port) }}
mqtt-topic = {{ dumps(mqtt_topic) }}
mqtt-tag = {{ dumps(slapparameter_dict.get('mqtt-tag')) }}
mqtt-username = {{ dumps(slapparameter_dict.get('mqtt-username')) }}
mqtt-password = {{ dumps(slapparameter_dict.get('mqtt-password')) }}
mqtt-ssl-enabled = {{ dumps(mqtt_ssl_enabled) }}
wendelin-ingestion-url = {{ dumps(slapparameter_dict['wendelin-ingestion-url']) }}
username = {{ dumps(slapparameter_dict['username']) }}
password = {{ dumps(slapparameter_dict['password']) }}
flush-interval = {{ slapparameter_dict['flush-interval'] }}
buffer-file-dir = {{ directory['fluentd-buffer'] }}
buffer-file-chunk-limit-size = {{ dumps(slapparameter_dict.get('buffer-file-chunk-limit-size')) }}
context =
  key mqtt_host :mqtt-host
  key mqtt_port :mqtt-port
  key mqtt_topic :mqtt-topic
  key mqtt_tag :mqtt-tag
  key mqtt_username :mqtt-username
  key mqtt_password :mqtt-password
  key mqtt_ssl_enabled :mqtt-ssl-enabled
  key wendelin_ingestion_url :wendelin-ingestion-url
  key username :username
  key password :password
  key flush_interval :flush-interval
  key buffer_file_dir :buffer-file-dir
  key buffer_file_chunk_limit_size :buffer-file-chunk-limit-size

[service-fluentd]
recipe = slapos.cookbook:wrapper
wrapper-path = {{ directory['service'] }}/fluentd-service
command-line = ${fluentd:location}/bin/fluentd -v -c $${fluentd-agent-conf:output}
environment =
  GEM_PATH=${fluentd:location}/lib/ruby/gems/

[publish]
recipe = slapos.cookbook:publish
mqtt-host = {{ dumps(mqtt_host) }}
mqtt-port = {{ dumps(mqtt_port) }}
mqtt-topic = {{ dumps(mqtt_topic) }}

[buildout]
extends = ${monitor-template:output}

parts =
  service-fluentd
  fluentd-agent-conf
  publish
