[buildout]
extends =
  buildout.hash.cfg
  ../../component/fluentd/buildout.cfg
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg

parts =
  software.json
  instance-input.json
  instance-output.json
  instance-expert-input.json
  instance-expert-output.json
  instance-mqtt-input.json
  instance-mqtt-output.json
  template
  slapos-cookbook

[directory]
recipe = slapos.recipe.build:mkdirectory
json-schema = ${buildout:directory}/json-schema

[download-json-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}
destination = ${directory:json-schema}/${:filename}

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}

[template-base]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}

[software.json]
<= download-json-base

[instance-input.json]
<= download-json-base

[instance-output.json]
<= download-json-base

[instance-expert-input.json]
<= download-json-base

[instance-expert-output.json]
<= download-json-base

[instance-mqtt-input.json]
<= download-json-base

[instance-mqtt-output.json]
<= download-json-base

[template]
<= template-base
output = ${buildout:directory}/template.cfg

[template-fluentd]
<= template-base
output = ${buildout:directory}/template-fluentd.cfg

[template-fluentd-expert]
<= template-base
output = ${buildout:directory}/template-fluentd-expert.cfg

[template-fluentd-agent-conf]
<= download-base

[template-fluentd-mqtt]
<= template-base
output = ${buildout:directory}/template-fluentd-mqtt.cfg

[template-fluentd-mqtt-conf]
<= download-base

[fluentd]
gems +=
  fluent-plugin-wendelin==0.5
  fluent-plugin-bin==0.3
  fluent-plugin-mqtt-io==1.0.0
