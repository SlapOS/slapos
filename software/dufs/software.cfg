[buildout]
extends =
  ../../component/rust/buildout.cfg
  ../../stack/caucase/buildout.cfg
  ../../stack/slapos.cfg
  buildout.hash.cfg

parts =
  slapos-cookbook
  caucase-eggs
  instance.cfg.jinja2
  instance-input-schema.json

[dufs]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/sigoden/dufs/archive/refs/tags/v0.43.0.tar.gz
md5sum = 77da2d3e5b5f7f159707db5c93ce8a9d
configure-command = :
make-binary = cargo install --root=%(location)s --path . --locked
make-targets =
environment =
  PATH=${rustc:location}/bin:%(PATH)s


[instance.cfg.jinja2]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/instance.cfg
url = ${:_profile_base_location_}/${:filename}
context =
  section buildout buildout
  raw openssl_bin ${openssl:location}/bin/openssl
  raw dash_bin ${dash:location}/bin/dash
  raw curl_bin ${curl:location}/bin/curl
  raw dufs_bin ${dufs:location}/bin/dufs
  raw software_json ${software.cfg.json:target}
  key template_monitor monitor2-template:output
import-list =
  file caucase caucase-jinja2-library:target

[directory]
recipe = slapos.recipe.build:mkdirectory
json-schema = ${buildout:directory}/json-schema

[download-json-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}
destination = ${directory:json-schema}/${:_buildout_section_name_}

[software.cfg.json]
<= download-json-base
[instance-input-schema.json]
<= download-json-base
