[buildout]
extends =
  ../../component/git/buildout.cfg
  ../../component/rust/buildout.cfg
  ../../stack/caucase/buildout.cfg
  ../../stack/slapos.cfg
  buildout.hash.cfg

parts =
  slapos-cookbook
  caucase-eggs
  template
  software.cfg.json
  instance-input-schema.json
  instance-output-schema.json

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}

[template-default]
<= download-base

[dufs]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/sigoden/dufs/archive/refs/tags/v0.43.0.tar.gz
md5sum = 77da2d3e5b5f7f159707db5c93ce8a9d
configure-command = :
make-binary = cargo install --root=%(location)s --path . --locked
make-targets =
environment =
  PATH=${rustc:location}/bin:%(PATH)s

[directory]
recipe = slapos.recipe.build:mkdirectory
json-schema = ${buildout:directory}/json-schema

[download-json-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}
destination = ${directory:json-schema}/${:filename}

[software.cfg.json]
<= download-json-base
[instance-input-schema.json]
<= download-json-base
[instance-output-schema.json]
<= download-json-base

[dufs-backup]
recipe = slapos.recipe.template:jinja2
output = ${buildout:bin-directory}/dufs-backup
inline =
  #!/bin/sh -e
  cd "$1" || {
    rm -rf "$1.new"
    git init --bare "$1.new"
    rm "$1.new"/description "$1.new"/hooks/*
    mv "$1.new" "$1"
    cd "$1"
  }
  ls -1 "$2" | while read f ; do
    h=`cat "$2"/$f |git hash-object --stdin -w`
    git update-index --add --cacheinfo 0644 "$h" $f
  done
  git diff --cached --quiet || GIT_WORK_TREE=$PWD GIT_DIR=$PWD git \
    -c user.name="$${0##*/}" -c user.email="$USER@`hostname`" \
    -c gc.auto=100 -c gc.autoDetach=false commit --allow-empty-message -qm ''
  [ ! "$3" ] || git push --mirror "$3"
context =
  key git_location git:location
