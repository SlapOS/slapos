[buildout]
parts =
  switch-softwaretype

eggs-directory = ${buildout:eggs-directory}
develop-eggs-directory = ${buildout:develop-eggs-directory}
offline = true

[slap-configuration]
<= slap-connection
recipe = slapos.cookbook:slapconfiguration.jsonschema
jsonschema = ${software.cfg.json:target}
set-default = main
validate-parameters = main
unstringify = none

[switch-softwaretype]
recipe = slapos.cookbook:switch-softwaretype
default = dynamic-template-default:output

[dynamic-template-default]
recipe = slapos.recipe.template:jinja2
output = $${buildout:directory}/$${:filename}
url = ${template-default:target}
filename = instance-default.cfg
extensions = jinja2.ext.do
context =
  key eggs_directory buildout:eggs-directory
  key develop_eggs_directory buildout:develop-eggs-directory
  raw buildout_bin ${buildout:bin-directory}
  raw openssl_bin ${openssl:location}/bin/openssl
  raw dash_bin ${dash:location}/bin/dash
  raw curl_bin ${curl:location}/bin/curl
  raw dufs_bin ${dufs:location}/bin/dufs
  key slapparameter_dict slap-configuration:configuration
  raw template_monitor ${monitor2-template:output}
  raw software_json ${software.cfg.json:target}
import-list =
  rawfile caucase ${caucase-jinja2-library:target}
