[buildout]
extends =
  buildout.hash.cfg
  ../../component/dash/buildout.cfg
  ../../component/dcron/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../component/nginx/buildout.cfg
  ../../component/rdiff-backup/buildout.cfg
  ../../component/rsync/buildout.cfg
  ../../component/openssh/buildout.cfg
  ../../component/grep/buildout.cfg
  ../../component/findutils/buildout.cfg
  ../../component/util-linux/buildout.cfg
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg

# Python2 versions for buildout (keep last)
  ../../stack/slapos-py2.cfg

parts =
  dcron
  logrotate
  nginx
  rsync
  template
  template-pullrdiffbackup
  template-backup-script
  template-crontab-line
  slapos-cookbook
  instance-output-schema.json
  instance-input-schema.json
  instance-slave-input-schema.json
  instance-slave-output-schema.json

[rdiff-backup]
<= rdiff-backup-1.0.5

[rssgen-eggs]
recipe = zc.recipe.egg
interpreter = python-${:_buildout_section_name_}
eggs =
  PyRSS2Gen
  python-dateutil

##########################################################
# Service startup scripts and configuration files
##########################################################
[template-nginx-service]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-nginx-configuration]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-dcron-service]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-backup-script]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-crontab-line]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-crontab]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[status2rss]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

[template-update-rss-script]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/${:filename}

##########################################################
# Buildout instance.cfg templates
##########################################################
[template-pullrdiffbackup]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template-pullrdiffbackup.cfg

[directory]
recipe = slapos.recipe.build:mkdirectory
json = ${buildout:parts-directory}/json-schema

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg
configuration = slap-configuration:configuration
software.json = ${software.json:target}

[versions]
gunicorn = 19.1.1

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}
destination = ${directory:json}/${:filename}

[instance-slave-input-schema.json]
<= download-base

[instance-slave-output-schema.json]
<= download-base

[instance-input-schema.json]
<= download-base

[instance-output-schema.json]
<= download-base

[software.json]
<= download-base
