[buildout]
extends =
  ../../stack/lamp/buildout.cfg
  ../../component/git/buildout.cfg
  ../../component/xz-utils/buildout.cfg
  ../../component/postfix/buildout.cfg
  ../../component/postgrey/buildout.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/logrotate/buildout.cfg
  buildout.hash.cfg
  ../../stack/slapos.cfg


parts =
  slapos-cookbook
  template
  postfix
  postgrey
  postgrey-perl
  spf-engine
  composer
  omailgw-api-source
  omailgw-ui-source
  omailgw-cli-source
  omailgw-api-prepared

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg

[template-relay]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-relay.cfg.jinja2

[template-cluster]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-cluster.cfg.jinja2

[template-omailgw]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-omailgw.cfg.jinja2

[copy-to-instance]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}

[postfix_main.jinja2.cf]
<= copy-to-instance

[postfix_master.jinja2.cf]
<= copy-to-instance

[postfix_transport.in]
<= copy-to-instance

[postfix_sender_access.jinja2]
<= copy-to-instance

[postfix_client_sender_access.jinja2]
<= copy-to-instance

[postfix_smtpd_sasl.jinja2.conf]
<= copy-to-instance

[postfix_sender_login_map.jinja2]
<= copy-to-instance

[postfix_sender_dependent_transport.jinja2]
<= copy-to-instance

[postfix_proxy_sasl_passwd_map.jinja2]
<= copy-to-instance

[policyd_spf.jinja2.conf]
<= copy-to-instance

[copy-at-root]
<= copy-to-instance
destination = ${buildout:directory}/${:_buildout_section_name_}

[software.cfg.json]
<= copy-at-root

[instance-relay-input-schema.json]
<= copy-at-root

[instance-cluster-input-schema.json]
<= copy-at-root

[instance-omailgw-input-schema.json]
<= copy-at-root

[instance-omailgw-output-schema.json]
<= copy-at-root

[spf-engine]
recipe = zc.recipe.egg
eggs =
  spf-engine
  dnspython
scripts = policyd-spf

[instance-slave-input-schema.json]
<= copy-at-root

[omailgw-api.env.in]
<= copy-to-instance

[omailgw-apache-extra.conf.in]
<= copy-to-instance

[omailgw-bootstrap.php.in]
<= copy-to-instance

[omailgw-cli-config.php.in]
<= copy-to-instance

[omailgw-ui-settings.js.in]
<= copy-to-instance

[omailgw-my.cnf.in]
<= copy-to-instance

[apache-php]
configure-options +=
  --with-pdo-sqlite=${sqlite3:location}
  --with-sqlite3=${sqlite3:location}

[omailgw-api-source]
recipe = slapos.recipe.build:gitclone
repository = https://framagit.org/omailgw/omailgw-api.git
revision = 8434ed15451482257cc2908d72c55addb6a38d2e

[omailgw-ui-source]
recipe = slapos.recipe.build:gitclone
repository = https://framagit.org/omailgw/omailgw.git
revision = 4690200544029c97baed443266777dcd17d27316

[omailgw-cli-source]
recipe = slapos.recipe.build:gitclone
repository = https://framagit.org/omailgw/omailgw-cli.git
revision = 3f9b96d6425cbfd510a391e142dfb0485bd1059a

[omailgw-api-prepared]
recipe = slapos.recipe.build
source = ${omailgw-api-source:location}
composer = ${composer:output}
init =
  self.git = self.buildout['git']['location']
  self.apache_php = self.buildout['apache-php']['location']
install =
  import os
  import shutil
  import subprocess

  source = options['source']
  if os.path.exists(location):
    shutil.rmtree(location)
  shutil.copytree(source, location, symlinks=True)

  env = os.environ.copy()
  env['COMPOSER_HOME'] = os.path.join(location, '.composer')
  env['HOME'] = location
  env['PATH'] = ':'.join([
    os.path.join(self.git, 'bin'),
    os.path.join(self.apache_php, 'bin'),
    env.get('PATH', ''),
  ])
  subprocess.check_call(
    [
      options['composer'],
      'install',
      '--no-dev',
      '--no-interaction',
      '--optimize-autoloader',
      '--prefer-dist',
      '--no-scripts',
    ],
    cwd=location,
    env=env,
  )
update = self.install()
