[buildout]
extends =
  ../../component/xz-utils/buildout.cfg
  ../../component/postfix/buildout.cfg
  ../../component/postgrey/buildout.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/logrotate/buildout.cfg
  buildout.hash.cfg
  ../../stack/slapos.cfg


parts =
  slapos-cookbook
  template
  postfix
  postgrey
  postgrey-perl
  spf-engine

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg

[template-relay]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-relay.cfg.jinja2

[template-cluster]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-cluster.cfg.jinja2

[copy-to-instance]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}

[postfix_main.jinja2.cf]
<= copy-to-instance

[postfix_master.jinja2.cf]
<= copy-to-instance

[postfix_transport.in]
<= copy-to-instance

[postfix_sender_access.jinja2]
<= copy-to-instance

[postfix_client_sender_access.jinja2]
<= copy-to-instance

[postfix_smtpd_sasl.jinja2.conf]
<= copy-to-instance

[postfix_sender_login_map.jinja2]
<= copy-to-instance

[postfix_sender_dependent_transport.jinja2]
<= copy-to-instance

[postfix_proxy_sasl_passwd_map.jinja2]
<= copy-to-instance

[policyd_spf.jinja2.conf]
<= copy-to-instance

[copy-at-root]
<= copy-to-instance
destination = ${buildout:directory}/${:_buildout_section_name_}

[software.cfg.json]
<= copy-at-root

[instance-relay-input-schema.json]
<= copy-at-root

[instance-cluster-input-schema.json]
<= copy-at-root

[spf-engine]
recipe = zc.recipe.egg
eggs =
  spf-engine
  dnspython
scripts = policyd-spf

[instance-shared-input-schema.json]
<= copy-at-root
