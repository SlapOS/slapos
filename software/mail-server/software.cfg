[buildout]
extends =
  ../../component/xz-utils/buildout.cfg
  ../../component/postfix/buildout.cfg
  ../../component/bogofilter/buildout.cfg
  ../../component/dovecot-pigeonhole/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/apache-php/buildout.cfg
  buildout.hash.cfg
  ../../stack/slapos.cfg

parts =
  slapos-cookbook
  template
  dovecot-pigeonhole
  postfix
  apache-php
  bogofilter

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg

[template-default]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-default.cfg.jinja2

[template-download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}

[template-apache.conf]
<= template-download-base

[template-php.ini]
<= template-download-base

[template-apache-httpd]
<= template-download-base

[template-snappymail.jinja2.ini]
<= template-download-base

[template-snappymail-domain.jinja2.json]
<= template-download-base

[copy-to-instance]
recipe   = slapos.recipe.build:download
url      = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}

[dovecot.jinja2.conf]
<= copy-to-instance

[password.php.in]
<= copy-to-instance

[postfix_main.jinja2.cf]
<= copy-to-instance

[postfix_master.jinja2.cf]
<= copy-to-instance

[postfix_relays.in]
<= copy-to-instance

[postfix_sasl_passwd.in]
<= copy-to-instance

[mail-config.jinja2.xml]
<= copy-to-instance

[snappymail]
recipe = slapos.recipe.build
version = 2.38.2
url = https://github.com/the-djmaze/snappymail/releases/download/v${:version}/snappymail-${:version}.tar.gz
md5sum = 551af7a01691f8d988c16aa73c75e686
original-code =
    case"Forward":u?(t.keep()&&(s.fileinto=1,l.push(a+'fileinto "INBOX";')),
    l.push(a+"redirect "+u+";")):h("redirect");break;
patched-code =
    case"Forward":u?(t.keep()&&(s.fileinto=1,l.push(a+'fileinto "INBOX";')),
    s.editheader=1,s.variables=1,s.envelope=1,
    l.push(a+'if header :matches "From" "*" {'),
    l.push(a+a+'set "original_from" "$${1}";'),
    l.push(a+"}"),
    l.push(a+'if envelope :matches "to" "*" {'),
    l.push(a+a+'set "forward_from" "$${1}";'),
    l.push(a+"}"),
    l.push(a+'addheader "X-Forwarded-For" "$${forward_from} '+u.slice(1,-1)+'";'),
    l.push(a+'addheader "X-Forwarded-To" '+u+";"),
    l.push(a+'if not header :matches "Reply-To" "*" {'),
    l.push(a+a+'addheader "Reply-To" "$${original_from}";'),
    l.push(a+"}"),
    l.push(a+'deleteheader "X-Bogosity";'),
    l.push(a+'deleteheader "DKIM-Signature";'),
    l.push(a+'deleteheader "From";'),
    l.push(a+'addheader "From" "$${forward_from}";'),
    l.push(a+"redirect "+u+";")):h("redirect");break;
install =
  import os
  # Download and extract snappymail
  self.copyTree(guessworkdir(self.extract(self.download())), location)
  # Make top directory world-readable as it should be (otherwise it's 0o700)
  os.chmod(location, 0o755)
  # XXX: Patch generated forwarding sieve script to edit headers appropriately.
  # Ugly because snappyail ships minified js.
  sieve_js = os.path.join(
    location,
    'snappymail', 'v', options['version'], 'static', 'js', 'min', 'sieve.min.js',
  )
  # match and replace minified code
  original_code = ''.join(options['original-code'].splitlines())
  patched_code = ''.join(options['patched-code'].splitlines())
  with open(sieve_js) as f:
    content = f.read()
  occurence_count = content.count(original_code)
  if occurence_count != 1:
    raise Exception(
      "Forward case pattern is expected to occur exactly once in sieve.min.js, "
      "not %d times" % occurence_count
    )
  content = content.replace(original_code, patched_code)
  with open(sieve_js, 'w') as f:
    f.write(content)

[snappymail-official-plugins]
recipe = slapos.recipe.build:gitclone
repository = https://github.com/the-djmaze/snappymail.git
depth = 1
revision = v2.38.2
sparse-checkout = plugins/

[snappymail-import-dovecot]
recipe = slapos.recipe.build:gitclone
repository = https://lab.nexedi.com/zdimension/snappymail-import-dovecot.git
depth = 1
revision = 1e4c7e909f4574e422ceccdabed6bf294a367dcd

[snappymail-plugins-folder]
recipe = slapos.recipe.build
official-plugins = ${snappymail-official-plugins:location}/plugins
extra-plugins =
  import-dovecot ${snappymail-import-dovecot:location}
install =
  import os
  self.copyTree(options['official-plugins'], location)
  for line in options['extra-plugins'].splitlines():
    line = line.strip()
    name, path = line.split()
    self.copyTree(path, os.path.join(location, name), ignore_dir_list=['.git'])

[snappymail-login-register.js]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
destination = ${snappymail-plugins-folder:location}/login-register/LoginRegister.js

[snappymail-pw-driver.php]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
destination = ${snappymail-plugins-folder:location}/change-password/drivers/dovecot.php

[snappymail-plugins]
# Indirection to snappymail-plugins-folder to ensure patches are applied
location = ${snappymail-plugins-folder:location}
depend-plugin-patches =
  ${snappymail-login-register.js:recipe}
  ${snappymail-pw-driver.php:recipe}

[copy-at-root]
<= copy-to-instance
destination = ${buildout:directory}/${:_buildout_section_name_}

[software.cfg.json]
<= copy-at-root

[instance-default-input-schema.json]
<= copy-at-root

[instance-slave-input-schema.json]
<= copy-at-root

