[buildout]
extends =
  ../../component/xz-utils/buildout.cfg
  ../../component/postfix/buildout.cfg
  ../../component/bogofilter/buildout.cfg
  ../../component/dovecot-pigeonhole/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/apache-php/buildout.cfg
  buildout.hash.cfg
  ../../stack/slapos.cfg

parts =
  slapos-cookbook
  template
  dovecot-pigeonhole
  postfix
  apache-php
  bogofilter
  snappymail-sieve-patch

[template]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/template.cfg

[template-default]
recipe = slapos.recipe.template
url = ${:_profile_base_location_}/${:_update_hash_filename_}
output = ${buildout:directory}/instance-default.cfg.jinja2

[template-download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}

[template-apache.conf]
<= template-download-base

[template-php.ini]
<= template-download-base

[template-apache-httpd]
<= template-download-base

[template-snappymail.jinja2.ini]
<= template-download-base

[template-snappymail-domain.jinja2.json]
<= template-download-base

[copy-to-instance]
recipe   = slapos.recipe.build:download
url      = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}

[dovecot.jinja2.conf]
<= copy-to-instance

[password.php.in]
<= copy-to-instance

[postfix_main.jinja2.cf]
<= copy-to-instance

[postfix_master.jinja2.cf]
<= copy-to-instance

[postfix_relays.in]
<= copy-to-instance

[postfix_sasl_passwd.in]
<= copy-to-instance

[mail-config.jinja2.xml]
<= copy-to-instance

[snappymail]
url = https://github.com/the-djmaze/snappymail/releases/download/v2.38.2/snappymail-2.38.2.tar.gz
md5sum = 551af7a01691f8d988c16aa73c75e686
recipe = slapos.recipe.build:download-unpacked
archive-root =

[patch-snappymail-sieve.py]
<= template-download-base
filename = patch-snappymail-sieve.py

[snappymail-sieve-patch]
recipe = slapos.recipe.build
snappymail-location = ${snappymail:location}
patch-script = ${patch-snappymail-sieve.py:target}
install =
  import os, subprocess, sys
  os.makedirs(options['location'], exist_ok=True)
  subprocess.check_call([
    sys.executable,
    options['patch-script'],
    options['snappymail-location']])

[snappymail-official-plugins]
recipe = slapos.recipe.build:gitclone
repository = https://github.com/the-djmaze/snappymail.git
revision = v2.38.2
sparse-checkout = plugins/

[snappymail-import-dovecot]
recipe = slapos.recipe.build:gitclone
repository = https://lab.nexedi.com/zdimension/snappymail-import-dovecot.git
revision = 5979f03a271f47ce3e85b48bf9535b176731cb1c

[snappymail-plugins-folder]
recipe = slapos.recipe.build
official-plugins = ${snappymail-official-plugins:location}/plugins
extra-plugins =
  import-dovecot ${snappymail-import-dovecot:location}
install =
  import os
  self.copyTree(options['official-plugins'], location)
  for line in options['extra-plugins'].splitlines():
    line = line.strip()
    name, path = line.split()
    self.copyTree(path, os.path.join(location, name), ignore_dir_list=['.git'])

[snappymail-login-register.js]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
destination = ${snappymail-plugins-folder:location}/login-register/LoginRegister.js

[snappymail-pw-driver.php]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_buildout_section_name_}
destination = ${snappymail-plugins-folder:location}/change-password/drivers/dovecot.php

[snappymail-plugins]
# Indirection to snappymail-plugins-folder to ensure patches are applied
location = ${snappymail-plugins-folder:location}
depend-plugin-patches =
  ${snappymail-login-register.js:recipe}
  ${snappymail-pw-driver.php:recipe}

[copy-at-root]
<= copy-to-instance
destination = ${buildout:directory}/${:_buildout_section_name_}

[software.cfg.json]
<= copy-at-root

[instance-default-input-schema.json]
<= copy-at-root

[instance-slave-input-schema.json]
<= copy-at-root

