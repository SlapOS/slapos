[certificate-make-new]
recipe = slapos.recipe.template
openssl = ${openssl:location}/bin/openssl
output = ${buildout:bin-directory}/${:_buildout_section_name_}
inline =
  #!/bin/sh -e
  # usage: <script> bundle-file fingerprint-file
  ${:openssl} req \
    -newkey rsa -batch -new -sha256 -x509 -days 3650 -nodes \
    -keyout $1 -out $1
  ${:openssl} x509 \
    -noout -fingerprint -sha256 \
    -in $1 \
    > $2

[certificate-to-der]
recipe = slapos.recipe.template
openssl = ${openssl:location}/bin/openssl
output = ${buildout:bin-directory}/${:_buildout_section_name_}
inline =
  #!/bin/sh -e
  # usage: <script> bundle-file der-file
  ${:openssl} x509 \
    -outform der -in $1 \
    -out $2

[slapos-partition-bang]
recipe = zc.recipe.egg
eggs = slapos.core
scripts = ${:_buildout_section_name_}
entry-points = ${:scripts}=sys:exit
bang = ${buildout:bin-directory}/${:scripts}
initialization =
  import json, sys
  import slapos.slap
  options = json.loads(sys.argv[1])
  message = sys.argv[2]
  slap = slapos.slap.slap()
  slap.initializeConnection(
    options['server-url'],
    options.get('key-file'),
    options.get('cert-file'),
  )
  partition = slap.registerComputerPartition(
    options['computer-id'],
    options['partition-id'],
  )
  partition.bang(message)

[check-smtpd-certificate]
recipe = slapos.recipe.template
output = ${buildout:directory}/plugins/${:_buildout_section_name_}
inline =
  import smtplib
  import ssl
  import sys
  from zope.interface import implementer
  from slapos.grid.promise import interface
  from slapos.grid.promise.generic import GenericPromise

  @implementer(interface.IPromise)
  class RunPromise(GenericPromise):
    def sense(self):
      name = self.getConfig('service-name')
      host = self.getConfig('host')
      port = int(self.getConfig('port'))
      timeout = int(self.getConfig('timeout', 10))
      certificate_der_path = self.getConfig('certificate-der-path')
      with open(certificate_der_path, 'rb') as f:
        expected_certificate_der = f.read()

      ssl_context = ssl.create_default_context()
      ssl_context.check_hostname = False
      ssl_context.verify_mode = ssl.CERT_NONE

      with smtplib.SMTP(host, port, timeout=10) as smtp:
        smtp.ehlo()
        smtp.starttls(context=ssl_context)
        served_certificate_der = smtp.sock.getpeercert(binary_form=True)

      if served_certificate_der == expected_certificate_der:
        self.logger.info("%s serves the expected certificate", name)
      else:
        self.logger.error("%s does not serve the expected certificate", name)

