[buildout]
parts =
  asterisk-service
  asterisk-promise
  publish-connection-parameter
  cron-entry-logrotate
  logrotate-entry-asterisk

eggs-directory = ${buildout:eggs-directory}
develop-eggs-directory = ${buildout:develop-eggs-directory}
offline = true
extends =
  ${monitor2-template:output}
  ${template-logrotate-base:output}

[directory]
recipe = slapos.cookbook:mkdirectory
home = $${buildout:directory}
etc = $${:home}/etc/
etc_asterisk = $${:home}/etc/asterisk
var = $${:home}/var/
lib_asterisk = $${:var}/lib/asterisk
spool_asterisk = $${:var}/spool/asterisk
run = $${:var}/run/
bin = $${:home}/bin/
services = $${:etc}/service/

[instance-parameter]
recipe = slapos.cookbook:slapconfiguration
computer = $${slap-connection:computer-id}
partition = $${slap-connection:partition-id}
url = $${slap-connection:server-url}
key = $${slap-connection:key-file}
cert = $${slap-connection:cert-file}

[user-info]
recipe = slapos.cookbook:userinfo

[slap-configuration]
<= slap-connection
recipe = slapos.cookbook:slapconfiguration.jsonschema
jsonschema = ${software.json:target}
set-default = main
validate-parameters = main
unstringify = none

[slap-network-information]
local-ipv4 = $${slap-configuration:ipv4-random}
global-ipv6 = $${slap-configuration:ipv6-random}

[bind-ip-parameter]
recipe = slapos.recipe.build
slapparameter-dict = $${slap-configuration:configuration}
home = $${buildout:directory}
init =
  import json
  import ipaddress
  user_parameters = options.get('slapparameter-dict')
  bind_ip = user_parameters.get('bind-ip', '$${slap-network-information:local-ipv4}')
  if bind_ip == 'GLOBAL-IPV6':
    bind_ip = '$${slap-network-information:global-ipv6}'
  options['bind-ip'] = bind_ip
  port = '$${asterisk-port:port}'
  try:
    addr = ipaddress.ip_address(bind_ip)
    if addr.version == 6:
      options['bind-ip-with-port'] = '[%s]:%s' % (bind_ip, port)
    else:
      options['bind-ip-with-port'] = '%s:%s' % (bind_ip, port)
  except ValueError:
    options['bind-ip-with-port'] = '%s:%s' % (bind_ip, port)

[log-level-parameter]
recipe = slapos.recipe.build
slapparameter-dict = $${slap-configuration:configuration}
init =
  levels = ['error', 'warning', 'notice', 'verbose', 'debug']
  level = options['slapparameter-dict'].get('log-level', 'verbose')
  if level not in levels:
    level = 'verbose'
  options['log-types'] = ','.join(levels[:levels.index(level) + 1])

[publish-connection-parameter]
recipe = slapos.cookbook:publish
asterisk-ip = $${bind-ip-parameter:bind-ip-with-port}

# Deploy asterisk
[asterisk-port]
port = 5060

[asterisk.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/asterisk.conf
inline =
  [directories]
  astcachedir => /tmp
  astetcdir => $${directory:etc_asterisk}
  astmoddir => ${asterisk:location}/lib/asterisk/modules
  astvarlibdir => $${directory:home}/var/lib/asterisk
  astdbdir => $${directory:home}/var/lib/asterisk
  astkeydir => $${directory:home}/var/lib/asterisk
  astdatadir => $${directory:home}/var/lib/asterisk
  astagidir => $${directory:home}/var/lib/asterisk/agi-bin
  astspooldir => $${directory:home}/var/spool/asterisk
  astrundir => $${directory:home}/var/run/asterisk
  astlogdir => $${directory:home}/var/log/asterisk
  astsbindir => ${asterisk:location}/sbin

