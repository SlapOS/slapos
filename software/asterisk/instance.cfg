[buildout]
parts =
  logger.conf
  ccss.conf
  cdr.conf
  cel.conf
  features.conf
  indications.conf
  acl.conf
  manager.conf
  udptl.conf
  stasis.conf
  pjsip.conf
  modules.conf
  pjproject.conf
  extensions.conf
  asterisk-service
  asterisk-promise
  publish-connection-parameter

eggs-directory = ${buildout:eggs-directory}
develop-eggs-directory = ${buildout:develop-eggs-directory}
offline = true
extends = ${monitor2-template:output}

[directory]
recipe = slapos.cookbook:mkdirectory
home = $${buildout:directory}
etc = $${:home}/etc/
etc_asterisk = $${:home}/etc/asterisk
var = $${:home}/var/
lib_asterisk = $${:var}/lib/asterisk
spool_asterisk =$${:var}/spool/asterisk
run = $${:var}/run/
bin = $${:home}/bin/
services = $${:etc}/service/

[instance-parameter]
recipe = slapos.cookbook:slapconfiguration
computer = $${slap-connection:computer-id}
partition = $${slap-connection:partition-id}
url = $${slap-connection:server-url}
key = $${slap-connection:key-file}
cert = $${slap-connection:cert-file}

[user-info]
recipe = slapos.cookbook:userinfo

[slap-configuration]
<= slap-connection
recipe = slapos.cookbook:slapconfiguration.jsonschema
jsonschema = ${software.json:target}
set-default = main
validate-parameters = main
unstringify = none

[slap-network-information]
local-ipv4 = $${slap-configuration:ipv4-random}
global-ipv6 = $${slap-configuration:ipv6-random}

[bind-ip-parameter]
recipe = slapos.recipe.build
slapparameter-dict = $${slap-configuration:configuration}
home = $${buildout:directory}
init =
  import json
  import ipaddress
  user_parameters = options.get('slapparameter-dict')
  bind_ip = user_parameters.get('bind-ip', '$${slap-network-information:local-ipv4}')
  if bind_ip == 'GLOBAL-IPV6':
    bind_ip = '$${slap-network-information:global-ipv6}'
  options['bind-ip'] = bind_ip
  port = '$${asterisk-port:port}'
  try:
    addr = ipaddress.ip_address(bind_ip)
    if addr.version == 6:
      options['bind-ip-with-port'] = '[%s]:%s' % (bind_ip, port)
    else:
      options['bind-ip-with-port'] = '%s:%s' % (bind_ip, port)
  except ValueError:
    options['bind-ip-with-port'] = '%s:%s' % (bind_ip, port)

[publish-connection-parameter]
recipe = slapos.cookbook:publish
asterisk-ip = $${bind-ip-parameter:bind-ip-with-port}

# Deploy asterisk
[asterisk-port]
recipe = slapos.cookbook:free_port
minimum = 2222
maximum = 2232
ip = $${instance-parameter:ipv6-random}

[asterisk.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/asterisk.conf
inline =
  [directories]
  astcachedir => /tmp
  astetcdir => $${directory:etc_asterisk}
  astmoddir => ${asterisk:location}/lib/asterisk/modules
  astvarlibdir => $${directory:home}/var/lib/asterisk
  astdbdir => $${directory:home}/var/lib/asterisk
  astkeydir => $${directory:home}/var/lib/asterisk
  astdatadir => $${directory:home}/var/lib/asterisk
  astagidir => $${directory:home}/var/lib/asterisk/agi-bin
  astspooldir => $${directory:home}/var/spool/asterisk
  astrundir => $${directory:home}/var/run/asterisk
  astlogdir => $${directory:home}/var/log/asterisk
  astsbindir => ${asterisk:location}/sbin

[modules.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/modules.conf
inline =
  [modules]
  load = res_sorcery_config.so
  load = res_sorcery_memory.so
  load = res_sorcery_astdb.so
  load = res_pjproject.so
  load = res_pjsip.so
  load = res_pjsip_acl.so
  load = res_pjsip_aoc.so
  load = res_pjsip_authenticator_digest.so
  load = res_pjsip_caller_id.so
  load = res_pjsip_dialog_info_body_generator.so
  load = res_pjsip_diversion.so
  load = res_pjsip_dlg_options.so
  load = res_pjsip_dtmf_info.so
  load = res_pjsip_empty_info.so
  load = res_pjsip_endpoint_identifier_anonymous.so
  load = res_pjsip_endpoint_identifier_ip.so
  load = res_pjsip_endpoint_identifier_user.so
  load = res_pjsip_exten_state.so
  load = res_pjsip_header_funcs.so
  load = res_pjsip_history.so
  load = res_pjsip_logger.so
  load = res_pjsip_messaging.so
  load = res_pjsip_mwi.so
  load = res_pjsip_mwi_body_generator.so
  load = res_pjsip_nat.so
  load = res_pjsip_one_touch_record_info.so
  load = res_pjsip_outbound_authenticator_digest.so
  load = res_pjsip_outbound_publish.so
  load = res_pjsip_outbound_registration.so
  load = res_pjsip_path.so
  load = res_pjsip_pidf_body_generator.so
  load = res_pjsip_pidf_digium_body_supplement.so
  load = res_pjsip_pidf_eyebeam_body_supplement.so
  load = res_pjsip_publish_asterisk.so
  load = res_pjsip_pubsub.so
  load = res_pjsip_refer.so
  load = res_pjsip_registrar.so
  load = res_pjsip_rfc3326.so
  load = res_pjsip_rfc3329.so
  load = res_pjsip_sdp_rtp.so
  load = res_pjsip_send_to_voicemail.so
  load = res_pjsip_session.so
  load = res_pjsip_sips_contact.so
  load = res_pjsip_t38.so
  load = res_pjsip_xpidf_body_generator.so
  load = chan_pjsip.so
  load = pbx_config.so

[logger.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/logger.conf
inline =
  [general]
  [logfiles]
  full.log => notice,warning,error,verbose,debug

[ccss.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/ccss.conf
inline =
  [general]

[cdr.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/cdr.conf
inline =
  [general]
  enable=yes

[cel.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/cel.conf
inline =
  [general]
  enable=no

[features.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/features.conf
inline =
  [general]
  [featuremap]
  [applicationmap]

[indications.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/indications.conf
inline =
  [general]
  country=fr

[acl.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/acl.conf
inline =
  [default]

[manager.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/manager.conf
inline =
  [general]
  enabled=no

[udptl.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/udptl.conf
inline =
  [general]

[stasis.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/stasis.conf
inline =
  [threadpool]
  initial_size = 0
  idle_timeout_sec = 20
  max_size = 200

[pjproject.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/pjproject.conf
inline =
  [startup]
  log_level	= 5

[extensions.conf]
recipe = slapos.recipe.template:jinja2
url = ${extensions.conf.in:target}
output = $${directory:etc_asterisk}/extensions.conf
context =
  key slapparameter_dict slap-configuration:configuration

[pjsip.conf]
recipe = slapos.recipe.template:jinja2
output = $${directory:etc_asterisk}/pjsip.conf
context =
  key slapparameter_dict slap-configuration:configuration
inline =
  [transport-udp]
  type=transport
  protocol=udp
  bind=$${bind-ip-parameter:bind-ip-with-port}
  [transport-tcp]
  type=transport
  protocol=tcp
  bind=$${bind-ip-parameter:bind-ip-with-port}
  tcp_keepalive_enable=yes        ; Enable TCP keepalive (yes/no)
  tcp_keepalive_idle_time=30      ; Time in seconds the connection needs to remain idle before TCP starts sending keepalive probes
  tcp_keepalive_interval_time=10  ; The time in seconds between individual keepalive probes
  tcp_keepalive_probe_count=5     ; The maximum number of keepalive probes TCP should send before dropping the connection
  [amarisoft]
  type=endpoint
  context=call-ovh
  disallow=all
  allow=amrwb
  transport=transport-tcp
  aors=amarisoft
  force_rport=yes
  direct_media=no
  ice_support=yes
  [amarisoft]
  type=aor
  contact=sip:{{slapparameter_dict['local-number']}}@172.24.64.1
  [amarisoft]
  type=identify
  endpoint=amarisoft
  match=172.24.0.0/16
  [ovh-reg]
  type=registration
  transport=transport-udp
  outbound_auth=ovh_auth
  server_uri=sip:{{slapparameter_dict['sip-trunk-server']}}
  client_uri=sip:{{slapparameter_dict['sip-trunk-number']}}@{{slapparameter_dict['sip-trunk-server']}}
  contact_user={{slapparameter_dict['sip-trunk-number']}}
  retry_interval=60
  forbidden_retry_interval=600
  expiration=3600
  line=yes
  endpoint=ovh
  [ovh]
  type=endpoint
  context=call-amarisoft
  disallow=all
  allow=ulaw
  allow=alaw
  transport=transport-udp
  outbound_auth=ovh_auth
  aors={{slapparameter_dict['sip-trunk-number']}}
  from_user={{slapparameter_dict['sip-trunk-number']}}
  [ovh_auth]
  type=auth
  auth_type=userpass
  username={{slapparameter_dict['sip-trunk-number']}}
  password={{slapparameter_dict['sip-trunk-password']}}
  realm={{slapparameter_dict['sip-trunk-server']}}
  [ovh]
  type=identify
  endpoint=ovh
  match={{slapparameter_dict['sip-trunk-server']}}
  [{{slapparameter_dict['sip-trunk-number']}}]
  type=aor
  contact=sip:{{slapparameter_dict['sip-trunk-number']}}@{{slapparameter_dict['sip-trunk-server']}}
  max_contacts=1

[asterisk-service]
recipe = slapos.cookbook:wrapper
command-line = ${asterisk:location}/sbin/asterisk -fC $${asterisk.conf:output}
hash-existing-files =
  $${buildout:directory}/buildout.cfg
hash-files =
  $${directory:etc_asterisk}/pjsip.conf
  $${directory:etc_asterisk}/extensions.conf
  $${directory:etc_asterisk}/modules.conf
wrapper-path = $${directory:services}/asterisk
environment =
  HOME=$${directory:home}


[asterisk-promise]
<= monitor-promise-base
promise = check_socket_listening
name = asterisk.py
config-host = $${bind-ip-parameter:bind-ip}
config-port = $${asterisk-port:port}
