  load = res_pjsip_publish_asterisk.so
  load = res_pjsip_pubsub.so
  load = res_pjsip_refer.so
  load = res_pjsip_registrar.so
  load = res_pjsip_rfc3326.so
  load = res_pjsip_rfc3329.so
  load = res_pjsip_sdp_rtp.so
  load = res_pjsip_send_to_voicemail.so
  load = res_pjsip_session.so
  load = res_pjsip_sips_contact.so
  load = res_pjsip_t38.so
  load = res_pjsip_xpidf_body_generator.so
  load = chan_pjsip.so
  load = pbx_config.so
  load = res_rtp_asterisk.so
  load = codec_ulaw.so
  load = codec_alaw.so
  load = codec_amr.so
  load = codec_resample.so
  load = res_format_attr_amr.so
  load = bridge_simple.so
  load = bridge_softmix.so
  load = bridge_native_rtp.so
  load = app_verbose.so
  load = app_dial.so

[logger.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/logger.conf
inline =
  [general]
  [logfiles]
  full.log => $${log-level-parameter:log-types}

[ccss.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/ccss.conf
inline =
  [general]

[cdr.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/cdr.conf
inline =
  [general]
  enable=yes

[cel.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/cel.conf
inline =
  [general]
  enable=no

[features.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/features.conf
inline =
  [general]
  [featuremap]
  [applicationmap]

[indications.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/indications.conf
inline =
  [general]
  country=fr
  [fr]
  description = France
  ringcadence = 1500,3500
  dial = 440
  busy = 440/500,440/500
  ring = 440/1500,440/3500
  congestion = 440/250,440/250
  callwaiting = 440/300,0/10000
  dialrecall = !350+440/100,!350+440/100,!350+440/100,!350+440/100,!350+440/100,!350+440/100,350+440
  record = 1400/500,0/15000
  info = 950/330,1400/330,1800/330,0/1000

[acl.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/acl.conf
inline =
  [default]

[manager.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/manager.conf
inline =
  [general]
  enabled=no

[udptl.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/udptl.conf
inline =
  [general]

[stasis.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/stasis.conf
inline =
  [threadpool]
  initial_size = 0
  idle_timeout_sec = 20
  max_size = 200

[pjproject.conf]
recipe = slapos.recipe.template
output = $${directory:etc_asterisk}/pjproject.conf
inline =
  [startup]
  log_level	= 5

[extensions.conf]
recipe = slapos.recipe.template:jinja2
url = ${extensions.conf.in:target}
output = $${directory:etc_asterisk}/extensions.conf
context =
  key slapparameter_dict slap-configuration:configuration

[pjsip.conf]
recipe = slapos.recipe.template:jinja2
url = ${pjsip.conf.in:target}
output = $${directory:etc_asterisk}/pjsip.conf
context =
  key slapparameter_dict slap-configuration:configuration
  key bind_ip_with_port bind-ip-parameter:bind-ip-with-port

[asterisk-service]
recipe = slapos.cookbook:wrapper
command-line = ${asterisk:location}/sbin/asterisk -fC $${asterisk.conf:output}
hash-existing-files =
  $${buildout:directory}/buildout.cfg
hash-files =
  $${asterisk.conf:output}
  $${logger.conf:output}
  $${modules.conf:output}
  $${pjproject.conf:output}
  $${pjsip.conf:output}
  $${extensions.conf:output}
  $${ccss.conf:output}
  $${cdr.conf:output}
  $${cel.conf:output}
  $${features.conf:output}
  $${indications.conf:output}
  $${acl.conf:output}
  $${manager.conf:output}
  $${udptl.conf:output}
  $${stasis.conf:output}
wrapper-path = $${directory:services}/asterisk
environment =
  HOME=$${directory:home}


[asterisk-promise]
<= monitor-promise-base
promise = check_socket_listening
name = asterisk.py
config-host = $${bind-ip-parameter:bind-ip}
config-port = $${asterisk-port:port}

[logrotate-entry-asterisk]
<= logrotate-entry-base
name = asterisk
log = $${directory:home}/var/log/asterisk/full.log
post = ${asterisk:location}/sbin/asterisk -rx 'logger reload' -C $${asterisk.conf:output}
