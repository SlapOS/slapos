[nexedi-download]
recipe = slapos.recipe.build:download
shared = true

[nexedi-server]
<= nexedi-download
url = ${:_profile_base_location_}/${:_buildout_section_name_}

[re6st-logo]
<= nexedi-download
url = https://re6st.nexedi.com/NXD-Media.Logo.Re6st?format=#${:md5sum}
md5sum = 5cfa572286a3b5b034e25de541be3e42

[slapos-logo]
<= nexedi-download
url = https://slapos.nexedi.com/NXD-Media.Logo.Slapos?format=#${:md5sum}
md5sum = 97bd0f828ffbac2681af0f4bd72cba27

[re6st-node]
<= nexedi-download
url = https://download.opensuse.org/repositories/home:/VIFIBnexedi/xUbuntu_24.10/amd64/re6st-node_0.657+slapos1.g30e7680bc-1_amd64.deb
md5sum = c3c5dc5e1fefae2698b4406e22a0736d

[vm-ubuntu]
nexedi-packages =
  slapos-node /installer/re6st-node.deb /installer/nexedi-setup_1_all.deb
file.re6st-node.deb = ${re6st-node:target}
nexedi-early-packages = debhelper devscripts python3-yaml
nexedi-early-command =
  cd /nexedi
  python3 <<EOF >>debian/nexedi-setup.service
  from urllib.request import urlopen
  import yaml
  url = "https://lab.nexedi.com/nexedi/slapos.package/-/raw/master/playbook/%s.yml"
  def _(net, yml, get=lambda x: x):
    with urlopen(url % yml) as f:
      for k, v in get(yaml.safe_load(f)).items():
        k = k.split('_')
        if k[0] == 're6st':
          k.insert(1, net)
          print("Environment=%s=%s" % ('_'.join(k).upper(), v))
  print() # buildout block values don't end with a new line
  _('prod', 're6stnet', lambda x: x[0]['vars'])
  _('gnet', 'settings/gnet')
  EOF
  printf '#!/usr/bin/make -f\n%%:\n\tdh $@' >debian/rules
  chmod +x debian/rules
  dch --create -M --package nexedi-setup -v 1 ...
  dpkg-buildpackage -uc -b -d

nexedi-description = Helper tool to deploy re6st & slapos

file.nexedi/debian/control =
  inline:Source: nexedi-setup
  Section: admin
  Maintainer: Julien Muchembled <jm@nexedi.com>
  Build-Depends: debhelper-compat (= 13)
  Homepage: https://lab.nexedi.com/nexedi/slapos/-/blob/master/software/notepod/nexedi.cfg

  Package: nexedi-setup
  Architecture: all
  Depends: re6st-node, slapos-node, python3-webview
  Description: ${:nexedi-description}
file.nexedi/debian/install =
  inline:opt/* opt/nexedi
  *.desktop etc/xdg/autostart

file.nexedi/opt/re6st.png = ${re6st-logo:target}
file.nexedi/opt/slapos.png = ${slapos-logo:target}
exec.nexedi/opt/server = ${nexedi-server:target}
exec.nexedi/opt/client =
  inline:#!/usr/bin/python3
  import os, sys, webview
  from http import HTTPStatus

  def on_response(window, response):
    if response.status_code == HTTPStatus.NO_CONTENT:
      window.destroy()
      os._exit(0) # WKRD: shouldn't window.destroy() be enough?

  if __name__ == '__main__':
    window = webview.create_window(
      'Nexedi - Rapid.Space', 'http://127.0.0.1:8080/',
      resizable=False, height=320)
    window.events.request_sent += bool # WKRD: PR#1784
    window.events.response_received += on_response
    webview.start(gui='gtk')

file.nexedi/debian/nexedi-setup.service =
  inline:[Unit]
  ConditionPathExists=!/etc/opt/installer.sh
  ConditionPathExists=|!/etc/opt/slapos/slapos.cfg
  ConditionPathExists=|!/etc/re6stnet/re6stnet.conf
  Description=${:nexedi-description} - server part
  [Install]
  WantedBy=multi-user.target
  [Service]
  ExecStart=/opt/nexedi/server
  WorkingDirectory=/opt/nexedi

file.nexedi/nexedi-setup.desktop =
  inline:[Desktop Entry]
  Type=Application
  Name=Set up re6st & slapos
  Exec=/bin/sh -c '! systemctl is-active nexedi-setup.service || exec /opt/nexedi/client'
