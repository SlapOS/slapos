[buildout]
extends =
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg
parts =
  slapos-cookbook
  monitor-eggs
  template

[template]
recipe = slapos.recipe.template
output = ${buildout:directory}/template.cfg
inline =
  [buildout]
  extends = ${monitor2-template:output}
  parts = publish
    audit_os_version
    audit_encryption
    audit_uptodate
  eggs-directory = ${buildout:eggs-directory}
  develop-eggs-directory = ${buildout:develop-eggs-directory}

  [slap-configuration]
  <= slap-connection
  recipe = slapos.cookbook:slapconfiguration.serialised

  [publish]
  <= monitor-publish
  recipe = slapos.cookbook:publish.serialised

  [check-monitor-password-promise]
  recipe =

  [monitor-frontend-promise]
  recipe =

  [audit-promise]
  <= monitor-promise-base
  promise = $${:_buildout_section_name_}
  name = $${:_buildout_section_name_}.py

  [audit_os_version]
  <= audit-promise
  config-dist = Ubuntu
  config-versions = 25.10

  [audit_encryption]
  <= audit-promise

  [audit_uptodate]
  <= audit-promise
  config-check-other = ungoogled-chromium
