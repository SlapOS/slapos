[buildout]
extends =
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg
parts =
  slapos-cookbook
  monitor-eggs
  template

[template]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/template.cfg
inline =
  [buildout]
  extends = ${monitor2-template:output}
  parts = publish
    audit_os_version
    audit_encryption
    audit_uptodate
  eggs-directory = ${buildout:eggs-directory}
  develop-eggs-directory = ${buildout:develop-eggs-directory}

  [slap-configuration]
  <= slap-connection
  recipe = slapos.cookbook:slapconfiguration.serialised
  configuration.fido2-required = {{ dumps(True) }}
  configuration.os-versions = 26.04

  [publish]
  <= monitor-publish
  recipe = slapos.cookbook:publish.serialised

# Disable the 2 promises that depends on something that's external to the SR.
# A notepod user does not want instantiation to go berserk because the frontend
# is unreachable, or processing the slave request.
  [check-monitor-password-promise]
  recipe =
  [monitor-frontend-promise]
  recipe =

  [audit-promise]
  <= monitor-promise-base
  promise = $${:_buildout_section_name_}
  name = $${:_buildout_section_name_}.py

  [audit_os_version]
  <= audit-promise
  config-dist = Ubuntu
  config-versions = $${slap-configuration:configuration.os-versions}

  [audit_encryption]
  <= audit-promise
  config-fido2-required = $${slap-configuration:configuration.fido2-required}

  [audit_uptodate]
  <= audit-promise
  config-check-other = ungoogled-chromium
