[buildout]
extends =
  ../../stack/slapos.cfg
  ../../component/vm-img/debian.cfg
parts =
  vm-debian

[vm-debian]
size = 7761920ki
dists = debian-trixie
#vm.run = false
vnc-sock = /srv/slapgrid/slappart93/tmp/vnc.sock
packages +=
  firmware-linux firmware-iwlwifi firmware-sof-signed
  console-setup cryptsetup-bin dosfstools lvm2
  aptitude btrfs-compsize debsums eatmydata etckeeper git
  lm-sensors lsof man-db screen sshfs socat strace wget
#  ${:gnome} fonts-recommended plymouth-themes task-french-desktop
  libpwquality-tools sudo user-setup
gnome =
  gnome gnome-firmware gnome-shell-extension-dash-to-panel gnome-shell-extensions-extra ssh-askpass-gnome
preseed.language = en
preseed.keyboard-configuration/variant = us
preseed.partman-auto/expert_recipe = : 1 2 -1 - method{ format } format{ } use_filesystem{ } filesystem{ btrfs } options/noatime{ } options/compress{ } mountpoint{ / } . 1 0 0 - method{ biosgrub } . 40 0 0 - method{ efi } format{ } .
preseed.pkgsel/update-policy = unattended-upgrades
preseed.apt-setup/services-select = security, updates, backports
preseed.recommends = true
debconf.debconf =
grub-efi-amd64.grub2/force_efi_extra_removable = true
early-command =
  set /usr/lib/apt-setup/generators/99 preferences
  echo "echo '${:preferences}' >/target/etc/apt/$2" >$1$2
  chmod +x $1$2
preferences =
  Package: os-prober xserver-xorg
  Pin: version *
  Pin-Priority: -1
late-command =
  mv $1/installer /etc/initramfs-tools/scripts
  mv $1/installer.sh $1/target.sh /etc/opt
  rm $1/usr/lib/finish-install.d/08hw-detect
  for x in 10apt-cdrom-setup 10update-initramfs 95umount
  do mv --exchange $1/$x $1/usr/lib/finish-install.d
  done
  passwd -ld root
# XXX: did I miss something in partman recipe ?
  sfdisk --no-tell-kernel --part-type /dev/sda 3 uefi
  mount /boot/efi
  set /etc/default/grub.d/50-installer.cfg
  cat <<EOF >$1
  GRUB_DISTRIBUTOR="Laptop Installer - \$GRUB_DISTRIBUTOR"
  GRUB_CMDLINE_LINUX="\$GRUB_CMDLINE_LINUX systemd.mask=display-manager.service systemd.mask=grub-common.service systemd.mask=packagekit.service systemd.mask=unattended-upgrades.service boot=installer"
  GRUB_DISABLE_RECOVERY=true
  EOF
# Remove old kernel if any.
  echo '#clear APT::VersionedKernelPackages;' |
    apt-get -c /dev/stdin autopurge -y
  dpkg -P grub-pc grub-pc-bin
# The following line also runs update-grub.
  apt-get install -y --no-install-recommends grub-efi-amd64
  rm $1 /etc/apt/preferences
  set /usr/sbin/grub-install
  dpkg-divert --rename $1
  cat <<EOF >$1
  #!/bin/sh -e
  # Unless securing boot (and systemd-boot looks better than grub for that),
  # better stay as far away as possible from UEFI. However for fwupd,
  # we don't blacklist efivarfs/efi_pstore modules.
  exec "\$0.distrib" --no-nvram --removable "\$@"
  EOF
  chmod +x $1
  grub-install --target=x86_64-efi /dev/sda
  set /etc/default/console-setup /etc/systemd/system/rescue.service.d
  cat <<EOF >$1
  CHARMAP=UTF-8
  CODESET=guess
  unset FONTFACE FONTSIZE VIDEOMODE
  rm $1
  EOF
  mkdir $2
  cat <<EOF >$2/force.conf
  [Service]
  Environment=SYSTEMD_SULOGIN_FORCE=1
  EOF
  dpkg-reconfigure -f noninteractive console-setup
  mkdir /aptcache
# Ignore CDROM because it would not copy to cache.
  apt-get -o APT::Authentication::TrustCDROM=0 \
    -o Dir::Cache::Archives=/aptcache -o Debug::NoLocking=1 install -yd \
    cryptsetup-initramfs
  sleep 1h ||:

# 'exit 10' is a quick way to force the installer to stop in case of error

# Remove rather than comment.
exec.10apt-cdrom-setup =
  inline:#!/bin/sh
  sed -i '/^deb cdrom/,/^$/d' /target/etc/apt/sources.list || exit 10

# Update unconditionally.
exec.10update-initramfs =
  inline:#!/bin/sh
  /bin/in-target update-initramfs -uk all || exit 10

# Some clean-up and make volume read-only.
exec.95umount =
  inline:#!/bin/sh
  ( set -e
    chroot /target apt-get -o Dir::Etc::sourcelist=/dev/null update
    while read a b c
    do case $b in /target/*) x="$b $x";; esac
    done </proc/mounts
    umount $x
    chroot /target find /run /tmp -mindepth 1 -delete
    >/target/etc/fstab
    cd /mnt
    mkdir root
    mount -o noatime /dev/sda1 root
    umount /target /dev/.static/dev
    cd root
    mv @rootfs @
    btrfs sub snap -r @ @rootfs
    btrfs sub delete @
    btrfs send @rootfs |chroot @rootfs /bin/wc -c >send-size
    fstrim -v .
    cd ..
    umount root
  )
  [ $? = 0 ] || exit 10

file.installer =
  inline:mountroot() (
    unset ROOTFLAGS
    local_mount_root
    chroot root/@rootfs modprobe overlay
    mount -t tmpfs tmpfs /tmp
    cd /tmp
    mkdir rootfs up work merged
    mount --move /root rootfs
    mount -t overlay -o lowerdir=rootfs/@rootfs,upperdir=up,workdir=work \
      overlay merged
    mount --move merged /root
    cd /root
    mkdir mnt/overlay
    mount --move /tmp mnt/overlay
    cd etc/systemd/system
    tty () {
      mkdir getty@tty$1.service.d
      cat >getty@tty$1.service.d/installer.conf
    }
    tty 1 <<END
  ${:tty-common}/etc/opt/installer.sh
  UnsetEnvironment=
  UnsetEnvironment=LANGUAGE
  END
    tty 2 <<END
  ${:tty-common}-/sbin/agetty --autologin root --noclear %I \$TERM
  END
  )

tty-common = [Service]
  TTYVTDisallocate=no
  ExecStart=
  ExecStart=

exec.installer.sh =
  inline:#!/bin/sh
  ( set -e /dev/mapper/*_crypt
    [ ! -e "$1" ]
    trap 'echo Exit shell to restart.' 0
    dpkg-reconfigure -p high keyboard-configuration
    setupcon

    title='Where to install?'
    src=`lsblk -Q MOUNTPOINT -no PKNAME |sort -u`
    disks=`lsblk -Q "TYPE == \"disk\" && NAME != \"$src\"" -no NAME,MODEL`
    [ "$disks" ] || {
      NEWT_COLORS=root=,red whiptail --title "$title" --ok-button Cancel \
        --msgbox 'ERROR: No disk detected.' 0 0
      exit 1
    }
    ifs=$IFS
    IFS='
  '
    set $disks
    IFS=$ifs
    [ $# = 1 ] && [ ! "$(
      lsblk -nQ "TYPE != \"disk\" && PKNAME != \"$src\""
    )" ] && set on || set off
    dst=$(echo "$disks" |while read tag item; do
        echo $tag
        echo $item
        echo $1
      done |xargs -d '\n' whiptail --title "$title" --radiolist \
    "Current block devices excluding $src, which is this installer:\n\n$(
      lsblk -T -Q "PKNAME != \"$src\" && NAME != \"$src\"" \
        -o NAME,SIZE,RM,RO,TYPE,PARTTYPENAME,FSTYPE,LABEL
    )\n\nThe chosen device will be erased completely." 0 0 $# -- 3>&1 1>&2 2>&3)
    [ "$dst" ]

    [ "$(lsblk -nQ "PKNAME == \"$dst\"")" ] && {
      whiptail --title "$title" --defaultno --yesno "\
    WARNING: $dst contains partitions and all the data they contain will be lost.
             Are you sure you want to continue?" 0 0
      force=-f
    }

    title='Encryption passphrase'
    pwdbox () {
      whiptail --title "$title" --passwordbox "\\n$1" 9 77 3>&1 1>&2 2>&3
    }
    while :; do
      pass=`pwdbox 'Enter passphrase to set up disk encryption:'`
      msg=`echo "$pass" |pwscore 2>&1` && {
        [ "$pass" = "`pwdbox 'Re-enter passphrase to verify:'`" ] && break
        msg='Passphrases do not match.'
      }
      whiptail --title "$title" --msgbox "$msg" 0 0
    done

# /boot size (900MiB): Unfortunately, initrd images have become huge due
#                      graphics firmwares.
# EFI size (~100MiB): - grub needs <1M
#                     - Lenovo UEFI needs standard FAT32 (>32M)
#                     - fwupd wants something >50M
# swap size: ~ RAM size
# The first 4MiB are: - 1MiB unpartitioned (GPT table at the beginning)
#                     - 2MiB LUKS (why is the default much bigger and what
#                                  would be the point of so many key slots?)
#                     - 1MiB LVM (default)
# Overall, all FS are 4MiB-aligned/sized (except for EFI size)
    set 900 `blockdev --getsz /dev/$dst`
    M=$(( ($2 >> 13 << 2) - $1 - 100 ))
    printf ",$${M}M,L\n,$1M,L\n,+,U\n" |sfdisk -X gpt /dev/$dst
    set `sfdisk -ql /dev/$dst -o Device`

    udevadm wait $2
    echo -n "$pass" |cryptsetup luksFormat -qo 4096 $2 -
    dm=vg-crypt

    trap 'echo Unrecoverable error.' 0
    echo -n "$pass" |cryptsetup open --allow-discards -d - $2 $dm
    unset pass

    read m m kb </proc/meminfo
    pvcreate /dev/mapper/$dm
    vgcreate vg /dev/mapper/$dm
    lvcreate -L $(( M - (m >> 12 << 2) - 4 ))M -n root vg
    lvcreate -l 100%FREE -n swap vg

    cd /tmp
    mkdir dst fs
    setup_btrfs () {
      udevadm wait $1
      mkfs.btrfs $force -K $1
      mount -o noatime $1 fs
      cd fs
      eval "$4"
      cd ..
      mount -o noatime,subvol=$2 $1 $3
      umount fs
    }
    progress () {
      printf '\rCopying... %s%%' $1
    }
    setup_btrfs /dev/mapper/vg-root @rootfs dst '
      read end </mnt/overlay/rootfs/send-size
      btrfs send /mnt/overlay/rootfs/$2 |btrfs receive . &
      while sleep 1; read rchar pos </proc/$!/io; do
        progress $(( pos * 100 / end ))
      done 2>/dev/null
      wait
      progress 100
      echo
      mv $2 @
      btrfs sub snap @ $2
      btrfs sub delete @
      btrfs sub create @home'
    mount -o noatime,subvol=@home /dev/mapper/vg-root dst/home
    rm -r dst/boot/grub dst/boot/initrd*
    setup_btrfs $3 @ dst/boot '
      btrfs sub create $2
      btrfs sub set-default $2
      mv ../dst/boot/* $2
      [ ! "`find ../dst/boot -mindepth 1 2>&1`" ]' # assert no hidden file/dir
    rmdir fs

    cd dst
    mkfs.vfat $4
    mount -o noatime $4 boot/efi
    for x in dev dev/pts proc run sys tmp; do
      mount --bind /$x $x
      u="$x $u"
    done
    cp /etc/default/keyboard etc/default
    echo $dm UUID=`cryptsetup luksUUID $2` none luks,discard,x-initrd.attach \
      >etc/crypttab
    chroot . /etc/opt/target.sh /dev/$dst
    umount $u boot/efi boot home
    . etc/locale.conf
    systemctl import-environment LANG
    cd ..
    umount dst
    whiptail --title "Installation complete" --msgbox "\
  Installation is complete, so it is time to boot into your new system. Once off,
  make sure to remove the installation media before turning on your new system.

  Press ENTER to power off." 0 0
    exec poweroff
  )
  exec bash

exec.target.sh =
  inline:#!/bin/sh -e
  rm /etc/opt/installer.sh /etc/opt/target.sh \
     /etc/initramfs-tools/scripts/installer
  mp () {
    x=`findmnt -no UUID $1`
    echo UUID=$x "$@"
  }
  sw=/dev/mapper/vg-swap
  { mp / btrfs noatime,subvol=@rootfs
    mp /home btrfs noatime,subvol=@home
    mp /boot btrfs noatime,nofail
    mp /boot/efi vfat noatime,nofail,umask=0077
    echo $sw none swap nofail
  } >etc/fstab
  mkswap $sw
  echo RESUME=$sw >etc/initramfs-tools/conf.d/resume
  vgcfgbackup vg
  while ! dpkg-reconfigure locales
  do sleep 1
  done
  . /etc/locale.conf
  dpkg-reconfigure -f noninteractive console-setup
  apt-get install --mark-auto /aptcache/*.deb
  rm -r /aptcache
  apt-mark manual cryptsetup-initramfs
  apt-mark -o APT::Get::Assume-Yes=1 minimize-manual
  update-initramfs -ck all
  grub-install --target=x86_64-efi $1
  cat <<EOF >/etc/default/grub.d/00-default.cfg
# Editing commands in graphical GRUB is terribly slow, especially at native
# resolution. By default, users have no reason to use the menu anyway.
  GRUB_TIMEOUT=0
  GRUB_HIDDEN_TIMEOUT=1
  GRUB_HIDDEN_TIMEOUT_QUIET=true
  GRUB_CMDLINE_LINUX_DEFAULT='quiet splash'
  GRUB_TERMINAL=console
  EOF
  update-grub
  while ! user-setup
  do sleep 1
  done
  set -- `echo get passwd/username |debconf-communicate`
  usermod -aG sudo,kvm $2
  dpkg -P user-setup
