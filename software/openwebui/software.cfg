[buildout]
allow-picked-versions = false
extends =
  buildout.hash.cfg
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/haproxy/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../component/openssl/buildout.cfg

parts =
  slapos-cookbook
  haproxy
  logrotate
  openssl-output
  openwebui-eggs
  fix-google-namespace
  instance-profile
  software.json
  instance.json

# ──────────────────────────────────────────────
# Python environment with OpenWebUI dependencies
# ──────────────────────────────────────────────
[openwebui-eggs]
recipe = zc.recipe.egg
eggs =
  open-webui
  setuptools
interpreter = python-openwebui

# ──────────────────────────────────────────────
# Instance profile templates
# ──────────────────────────────────────────────
# google.* eggs use implicit namespace packages (no __init__.py),
# which do not work with pkg_resources-based egg directories.
# Add pkg_resources namespace declarations where missing.
[fix-google-namespace]
recipe = plone.recipe.command
command =
  for egg in ${buildout:eggs-directory}/google_*-py*.egg \
             ${buildout:eggs-directory}/googleapis_*-py*.egg; do
    dir="$egg/google"
    if [ -d "$dir" ] && [ ! -f "$dir/__init__.py" ]; then
      echo "__import__('pkg_resources').declare_namespace(__name__)" > "$dir/__init__.py"
    fi
  done
stop-on-error = true
update-command = ${:command}

[instance-profile]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/instance.cfg
url = ${:_profile_base_location_}/${:filename}
context =
  section buildout buildout
  key instance_openwebui instance-openwebui:target
  key software_json software.json:target
  raw haproxy_bin ${haproxy:location}
  raw logrotate_bin ${logrotate:location}
  raw python_bin ${buildout:bin-directory}/python-openwebui
  raw openwebui_bin ${buildout:bin-directory}/open-webui
  raw openssl_bin ${openssl-output:openssl}
  key template_monitor monitor2-template:output

[directory]
recipe = slapos.recipe.build:mkdirectory
json = ${buildout:parts-directory}/json-schema

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}

[json-download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}
destination = ${directory:json}/${:filename}

[software.json]
<= json-download-base
filename = software.cfg.json

[instance.json]
<= json-download-base
filename = instance-input-schema.json

[instance-openwebui]
<= download-base

