[buildout]

extends =
  ../../component/openssl/buildout.cfg
  ../../component/bcrypt/buildout.cfg
  ../../component/curl/buildout.cfg
  ../../component/dash/buildout.cfg
  ../../component/golang/buildout.cfg
  ../../component/restic/buildout.cfg
  ../../component/restic-rest-server/buildout.cfg
  ../../stack/caucase/buildout.cfg
  ../../stack/slapos.cfg
  buildout.hash.cfg

parts =
  slapos-cookbook
  caucase-eggs
  instance.cfg.in

[slapos-cookbook-dependencies]
eggs += ${bcrypt:egg}

[instance.cfg.in]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/instance.cfg
url = ${:_profile_base_location_}/${:filename}
context =
  section buildout buildout
  key restic_location restic:location
  key restic_rest_server_location restic-rest-server:location
  raw openssl_bin ${openssl:location}/bin/openssl
  raw dash_bin ${dash:location}/bin/dash
  raw curl_bin ${curl:location}/bin/curl
  key template_monitor monitor2-template:output
  key software_cfg_json software.cfg.json:destination
import-list =
  file caucase caucase-jinja2-library:target

[copy-to-instance]
recipe   = slapos.recipe.build:download
url      = ${:_profile_base_location_}/${:_buildout_section_name_}
filename = ${:_buildout_section_name_}

[copy-at-root]
<= copy-to-instance
destination = ${buildout:directory}/${:_buildout_section_name_}

[software.cfg.json]
<= copy-at-root
depends =
  ${instance-input-schema.json:recipe}
  ${instance-output-schema.json:recipe}

[instance-input-schema.json]
<= copy-at-root

[instance-output-schema.json]
<= copy-at-root
