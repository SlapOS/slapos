[buildout]
extends =
  buildout.hash.cfg
  ../../component/redis/buildout.cfg
  ../../component/ffmpeg/buildout.cfg
  ../../stack/lamp/buildout.cfg

[nc-download]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:filename}

[application]
url = https://download.nextcloud.com/server/releases/nextcloud-34.0.1.tar.bz2
md5sum = 76c4f2c02b1a767e492f2fcadfe65653

[template-nextcloud-install.sh]
<= nc-download

[template-nextcloud-config.json]
<= nc-download

[template-nextcloud-instance]
recipe = slapos.recipe.template:jinja2
url = ${:_profile_base_location_}/${:filename}
output = ${buildout:directory}/instance-nextcloud.cfg
extensions = jinja2.ext.do
context =
          key gzip_location          gzip:location
          key python3_location       python3:location
          key news_updater_location  news-updater:location
          key php_location           apache-php:location
          key ffmpeg_location        ffmpeg:location
          raw redis_bin              ${redis:location}/bin/redis-server
          raw redis_cli              ${redis:location}/bin/redis-cli
          key nextcloud_install_sh   template-nextcloud-install.sh:target
          key nextcloud_parameter_json template-nextcloud-config.json:target
          section nextcloud_apps     nextcloud-apps
          key composer_bin           composer:output

[custom-application-deployment]
path = ${template-nextcloud-instance:output}
part-list = nextcloud-install.sh
db-name = nextcloud
db-user = nextcloud

[nc-download-unpacked]
recipe = slapos.recipe.build:download-unpacked

[news-updater]
<= nc-download-unpacked
url = https://github.com/nextcloud/news-updater/archive/11.0.0.tar.gz
md5sum = 1e75222638cab49d3f66b7c76394f104

[nextcloud-app-spreed]
<= nc-download-unpacked
# note: this is not installed as no longer compatible with nextcloud 34
# maybe because of missing "mozart" in the setup
url = https://github.com/nextcloud-releases/spreed/releases/download/v23.0.8/spreed-v23.0.8.tar.gz
md5sum = ed2b6cff7722c9b32c29c6a075d87781

[nextcloud-app-richdocuments]
<= nc-download-unpacked
url = https://github.com/nextcloud/richdocuments/archive/refs/tags/v11.0.1.zip
md5sum = ad397d380c2e6fdc41cb0a39904477b7

[nextcloud-app-calendar]
<= nc-download-unpacked
url = https://github.com/nextcloud-releases/calendar/releases/download/v6.5.1/calendar-v6.5.1.tar.gz
md5sum = cdc99ac0356d3b9235d1894dc2a4621b

[nextcloud-app-snappymail]
<= nc-download-unpacked
# note: this is not installed as no longer compatible with nextcloud 34
# we could try https://github.com/the-djmaze/snappymail/discussions/1935 maybe
# if someone actually needs snappymail.
url = https://snappymail.eu/repository/nextcloud/snappymail-2.38.2-nextcloud.tar.gz
md5sum = 90824de9739094c395506a92b5317f95

[nextcloud-app-news]
<= nc-download-unpacked
url = https://github.com/nextcloud/news/releases/download/28.6.0/news.tar.gz
md5sum = 370222452dd9954995adc1549940b568

[nextcloud-apps]
#spreed = ${nextcloud-app-spreed:location}
richdocuments = ${nextcloud-app-richdocuments:location}
calendar = ${nextcloud-app-calendar:location}
#snappymail = ${nextcloud-app-snappymail:location}
news = ${nextcloud-app-news:location}
