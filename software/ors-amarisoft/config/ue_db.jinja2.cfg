ue_db: [
{%- for i, slave in enumerate(slap_configuration['sim_list']) %}
{%-   set s = json_module.loads(slave.pop('_')) %}
{%- if i == 0 -%}
{
{%- else -%}
, {
{%- endif %}
    sim_algo: "{{ s.get('sim_algo', 'milenage') }}",
    imsi: "{{ s.get('imsi', '') }}",
    opc: "{{ s.get('opc', '') }}",
    amf: {{ s.get('amf', '0x9001') }},
    sqn: "{{ s.get('sqn', '000000000000') }}",
    K: "{{ s.get('k', '') }}",
    impu: "{{ s.get('impu', '') }}",
    impi: "{{ s.get('impi', '') }}",
{%- if "ip" in s or slapparameter_dict.get('enable_multicast', False) or slapparameter_dict.get('enable_ipv6_multicast', False) or "routes" in s %}
    pdn_list:[{
      access_point_name: "internet",
      default: true,
{%-   if "ip" in s %}
      ipv4_addr: "{{ s['ip'] }}"
{%-   endif %}
{%-   if slapparameter_dict.get('enable_multicast', False) %}
      multicast: True,
{%-   endif %}
{%-   if slapparameter_dict.get('enable_ipv6_multicast', False) %}
      ipv6_multicast: True,
{%-   endif %}
{%-   if slapparameter_dict.get('enable_broadcast', False) %}
      broadcast: True,
{%-   endif %}
{%-   if "routes" in s %}
      routes: [
{%-     for route in s['routes'] %}
        [
          {
            ipv6_remote_addr_prefix: s['routes']['ipv6_remote_addr_prefix'],
            prefix_len: s['routes']['prefix_len'],
          }
        ],
{%-     endfor -%}
      ],
{%-   endif %}
    }]
{%- endif %}
}
{%- endfor -%}
]

