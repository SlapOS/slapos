[buildout]
extends =
  buildout.hash.cfg
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/haproxy/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../component/openssl/buildout.cfg
  ../../component/erp5-mcp-hateoas/buildout.cfg

parts =
# Native extensions first — their custom recipes must produce the
# develop-egg artifacts before any later part resolves transitive deps
# (the modern jsonschema chain pulls in rpds-py as a dep; mcp's OAuth
# flow pulls in cryptography via PyJWT).
  pydantic-core
  rpds-py
  python-cryptography
  slapos-cookbook
  haproxy
  logrotate
  openssl-output
  erp5-mcp-eggs
  instance-profile
  software.json
  instance.json

# ──────────────────────────────────────────────
# Python environment with MCP server dependencies
# ──────────────────────────────────────────────
[erp5-mcp-eggs]
recipe = zc.recipe.egg
eggs =
  ${pydantic-core:egg}
  ${rpds-py:egg}
  ${erp5-mcp-hateoas:egg}
  uvicorn
  httpx
  requests
  setuptools
interpreter = python-erp5-mcp

# ──────────────────────────────────────────────
# Instance profile templates
# ──────────────────────────────────────────────
[instance-profile]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/instance.cfg
url = ${:_profile_base_location_}/${:filename}
context =
  section buildout buildout
  key instance_erp5_mcp instance-erp5-mcp:target
  key software_json software.json:target
  raw haproxy_bin ${haproxy:location}
  raw logrotate_bin ${logrotate:location}
  raw python_bin ${buildout:bin-directory}/python-erp5-mcp
  raw openssl_bin ${openssl-output:openssl}
  key template_monitor monitor2-template:output

[directory]
recipe = slapos.recipe.build:mkdirectory
json = ${buildout:parts-directory}/json-schema

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}

[json-download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}
destination = ${directory:json}/${:filename}

[software.json]
<= json-download-base

[instance.json]
<= json-download-base

[instance-erp5-mcp]
<= download-base
