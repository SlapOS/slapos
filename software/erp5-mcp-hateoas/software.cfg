[buildout]
extends =
  buildout.hash.cfg
  ../../stack/slapos.cfg
  ../../stack/monitor/buildout.cfg
  ../../component/haproxy/buildout.cfg
  ../../component/logrotate/buildout.cfg
  ../../component/openssl/buildout.cfg

parts =
  slapos-cookbook
  haproxy
  logrotate
  openssl-output
  erp5-mcp-eggs
  instance-profile

# ──────────────────────────────────────────────
# Python environment with MCP server dependencies
# ──────────────────────────────────────────────
[erp5-mcp-eggs]
recipe = zc.recipe.egg
eggs =
  mcp
  uvicorn
  httpx
  requests
  setuptools
  erp5_mcp_hateoas
interpreter = python-erp5-mcp

# ──────────────────────────────────────────────
# Instance profile templates
# ──────────────────────────────────────────────
[instance-profile]
recipe = slapos.recipe.template:jinja2
output = ${buildout:directory}/instance.cfg
url = ${:_profile_base_location_}/${:filename}
context =
  section buildout buildout
  key instance_erp5_mcp instance-erp5-mcp:target
  raw haproxy_bin ${haproxy:location}
  raw logrotate_bin ${logrotate:location}
  raw python_bin ${buildout:bin-directory}/python-erp5-mcp
  raw openssl_bin ${openssl-output:openssl}
  key template_monitor monitor2-template:output

[download-base]
recipe = slapos.recipe.build:download
url = ${:_profile_base_location_}/${:_update_hash_filename_}

[instance-erp5-mcp]
<= download-base

[versions]
erp5-mcp-hateoas = 0.2.0
mcp = 1.8.1:whl
uvicorn = 0.34.0:whl
starlette = 0.45.3:whl
sse-starlette = 2.2.1:whl
httpx-sse = 0.4.0:whl
pydantic = 2.10.6:whl
pydantic-core = 2.27.2:whl
pydantic-settings = 2.7.1:whl
python-dotenv = 1.0.1:whl
python-multipart = 0.0.20:whl
