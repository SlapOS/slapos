[buildout]
extends =
  ../autoconf/buildout.cfg
  ../automake/buildout.cfg
  ../flex/buildout.cfg
  ../m4/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../openssl/buildout.cfg
  ../sqlite3/buildout.cfg

[bogofilter-download-common]
recipe = slapos.recipe.build
shared = true
# cmmi only chdirs to an unpacked archive's sub-directory when it is the only
# item in the unpacked archive's root directory, and the release archives for
# bogofilter on gitlab contain several items, including the desired directory
# for compilation. Downloading and extracting the archive beforehand and then
# using cmmi's path option has the drawback of writing in the installed paths
# of another, preferably shared section, damaging reproducibility. So instead
# let's re-archive the desired directory to give cmmi an archive structure it
# supports.
install =
  import os, shutil
  extract_dir = self.extract(self.download(options['url'], options['md5sum']))
  work_dir = os.path.join(guessworkdir(extract_dir), 'bogofilter')
  new_archive = os.path.join(location, 'bogofilter')
  shutil.make_archive(new_archive, 'gztar', work_dir)

[bogofilter-download-1.3.0.rc1]
<= bogofilter-download-common
url = https://gitlab.com/bogofilter/bogofilter/-/archive/bogofilter-1.3.0.rc1/bogofilter-bogofilter-1.3.0.rc1.tar.gz
md5sum = 2970116acc32906d15450053dd02b780

[bogofilter-common]
recipe = slapos.recipe.cmmi
shared = true
pre-configure = chmod -R +w . && autoreconf -i -I ${pkgconfig:location}/share/aclocal
make-targets = check install
make-options = -C src
environment =
  PATH=${autoconf:location}/bin:${pkgconfig:location}/bin:${automake:location}/bin:${flex:location}/bin:%(PATH)s
  PKG_CONFIG_PATH=${m4:location}/lib/pkgconfig:${openssl:location}/lib/pkgconfig:${sqlite3:location}/lib/pkgconfig
  CPPFLAGS=-I${sqlite3:location}/include
  LDFLAGS=-L${sqlite3:location}/lib

[bogofilter-1.3.0.rc1]
<= bogofilter-common
url = ${bogofilter-download-1.3.0.rc1:location}/bogofilter.tar.gz

[bogofilter]
<= bogofilter-1.3.0.rc1

