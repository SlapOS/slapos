[buildout]
extends =
  ../autoconf/buildout.cfg
  ../automake/buildout.cfg
  ../flex/buildout.cfg
  ../m4/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../openssl/buildout.cfg
  ../sqlite3/buildout.cfg

[bogofilter-common]
recipe = slapos.recipe.cmmi
shared = true
chdir = cd bogofilter 
pre-configure = ${:chdir} chmod -R +w . && autoreconf -i -I ${pkgconfig:location}/share/aclocal
configure-command = ${:chdir} && ./configure --prefix=@@LOCATION@@
make-binary = ${:chdir} && make
make-targets = check install
make-options = -C src
environment =
  PATH=${autoconf:location}/bin:${pkgconfig:location}/bin:${automake:location}/bin:${flex:location}/bin:%(PATH)s
  PKG_CONFIG_PATH=${m4:location}/lib/pkgconfig:${openssl:location}/lib/pkgconfig:${sqlite3:location}/lib/pkgconfig
  CPPFLAGS=-I${sqlite3:location}/include
  LDFLAGS=-L${sqlite3:location}/lib

[bogofilter-1.3.0.rc1]
<= bogofilter-common
url = https://gitlab.com/bogofilter/bogofilter/-/archive/bogofilter-1.3.0.rc1/bogofilter-bogofilter-1.3.0.rc1.tar.gz#${:md5sum}
md5sum = 2970116acc32906d15450053dd02b780

[bogofilter]
<= bogofilter-1.3.0.rc1

