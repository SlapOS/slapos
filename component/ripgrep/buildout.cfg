[buildout]
extends =
  ../rust/buildout.cfg

parts =
  ripgrep

[ripgrep]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/BurntSushi/ripgrep/archive/refs/tags/14.1.0.tar.gz
md5sum = ad6b5631a459fd20c257ca20a7eeaf73
configure-command = 
  cargo build --release
make-binary = /bin/true
make-options =
environment =
  PATH=${rustc:location}/bin:${cmake:location}/bin:%(PATH)s
post-install =
  mkdir -p %(location)s/bin
  cp target/release/rg %(location)s/bin/
