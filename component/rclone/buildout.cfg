[buildout]
extends =
  ../golang/buildout.cfg

parts =
  rclone

[golang]
<= golang1.21

[rclone]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/rclone/rclone/archive/refs/tags/v1.68.0.tar.gz
md5sum = d4d9b4f8677c7c3c81deb2667172ae1e
configure-command = 
  GO111MODULE=on CGO_ENABLED=0 ${golang:location}/bin/go build -ldflags="-s -w" -tags cmount
make-binary = /bin/true
make-options =
environment =
  GOROOT=${golang:location}
  PATH=${golang:location}/bin:${buildout:directory}/bin:%(PATH)s
post-install =
  mkdir -p %(location)s/bin
  cp rclone %(location)s/bin/
