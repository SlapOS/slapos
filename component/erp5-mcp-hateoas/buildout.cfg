# SlapOS component for the erp5-mcp-hateoas Python package.
# https://lab.nexedi.com/nexedi/erp5-mcp-hateoas

[buildout]
extends =
  ../jsonschema/buildout.cfg
  ../pydantic-core/buildout.cfg
  ../python-cryptography/buildout.cfg
  ../git/buildout.cfg

parts =
  erp5-mcp-hateoas

[erp5-mcp-hateoas]
recipe = zc.recipe.egg:develop
setup = ${erp5-mcp-hateoas-repository:location}
egg = erp5-mcp-hateoas
eggs =
  ${:egg}

# Rust-extension deps (pydantic-core, rpds-py via the jsonschema chain)
# install as develop-eggs from their zc.recipe.egg:custom sections. A
# consuming SR must list those parts in [parts] before this egg so the
# develop-egg artifacts exist when transitive resolution runs.

[erp5-mcp-hateoas/scripts]
recipe = zc.recipe.egg:scripts
eggs = ${erp5-mcp-hateoas:eggs}

[erp5-mcp-hateoas-repository]
recipe = slapos.recipe.build:gitclone
repository = https://lab.nexedi.com/nexedi/erp5-mcp-hateoas.git
location = ${buildout:parts-directory}/erp5-mcp-hateoas
git-executable = ${git:location}/bin/git
branch = master


# Coordinated egg-and-deps versions for everything that uses this
# component. The bare-version pin on pydantic-core (no `:whl`) lets the
# [pydantic-core] zc.recipe.egg:custom section build it from source
# instead of pulling a precompiled wheel. The :whl pins on the rest
# avoid pip's --no-build-isolation failure for hatchling/flit packages.
[versions]
mcp = 1.26.0:whl
uvicorn = 0.41.0:whl
starlette = 0.52.1:whl
sse-starlette = 3.3.2:whl
httpx-sse = 0.4.3:whl
pydantic = 2.11.9:whl
pydantic-core = 2.33.2
pydantic-settings = 2.13.1:whl
python-dotenv = 1.2.2:whl
python-multipart = 0.0.22:whl
PyJWT = 2.11.0:whl
pytest-asyncio = 1.3.0:whl
typing-inspection = 0.4.2:whl
annotated-types = 0.7.0:whl
