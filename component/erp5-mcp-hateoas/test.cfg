# SlapOS software release to run the erp5-mcp-hateoas egg's pytest suite
# on Nexedi testing infrastructure (zodbtools test-zodb6.cfg pattern).

[buildout]
extends =
  ../../stack/nxdtest.cfg
  ../pygolang/buildout.cfg
  ../pytest/buildout.cfg
  buildout.cfg

parts =
# Native extensions first — their custom recipes must produce the
# develop-egg artifacts before any later part resolves transitive deps.
  pydantic-core
  rpds-py
  python-cryptography
  erp5-mcp-hateoas
  erp5-mcp-hateoas-python
  erp5-mcp-hateoas-nxdtest
# for instance
  slapos-cookbook
  instance.cfg


# bin/python preinstalled with sys.path including erp5-mcp-hateoas[dev]
# (pytest, pytest-asyncio, plus the egg's runtime deps) and pygolang
# (which the python-interpreter base recipe wraps via gpython.pymain).
[erp5-mcp-hateoas-python]
<= python-interpreter
eggs =
  ${erp5-mcp-hateoas:egg}[dev]
  ${pygolang:egg}


# env.sh for the egg-aware python to be on $PATH.
[erp5-mcp-hateoas-env.sh]
recipe = slapos.recipe.template
output = ${buildout:directory}/${:_buildout_section_name_}
inline =
  export PS1="(erp5-mcp-hateoas-env) $PS1"
  export PATH=${buildout:bin-directory}:$PATH


# .nxdtest written into the egg's gitcloned source so nxdtest's
# runTestSuite discovers it from workdir.
[erp5-mcp-hateoas-nxdtest]
recipe = slapos.recipe.template
output = ${erp5-mcp-hateoas-repository:location}/.nxdtest
inline =
  TestCase(
      "erp5-mcp-hateoas",
      ['python', '-m', 'pytest', '-v'],
      summaryf=PyTest.summary,
  )


# Instance running nxdtest's runTestSuite against the egg's git checkout.
[instance.cfg]
<= jinja2-template
inline =
  [buildout]
  extends = ${nxdtest-instance.cfg:output}

  [runTestSuite]
  env.sh  = ${erp5-mcp-hateoas-env.sh:output}
  workdir = ${erp5-mcp-hateoas-repository:location}
