[buildout]
extends =
  ../golang/buildout.cfg

parts =
  lazygit

[lazygit]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/jesseduffield/lazygit/archive/refs/tags/v0.60.0.tar.gz
md5sum = 0cb2bfbc011af9fe6b99bb741024c7e9
configure-command = :
make-binary =
make-options =
  GO111MODULE=on CGO_ENABLED=0 ${golang:location}/bin/go build -ldflags="-s -w"
environment =
  PATH=${golang:location}/bin:%(PATH)s
post-install =
  mkdir -p %(location)s/bin
  cp lazygit %(location)s/bin/
