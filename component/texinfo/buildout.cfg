[buildout]
extends =
  ../ncurses/buildout.cfg
  ../perl/buildout.cfg

[texinfo]
# Most other components are not happy with texinfo 5, because it treats some
# used-to-be-warnings as errors.
<= texinfo4

[texinfo4]
recipe = slapos.recipe.cmmi
shared = true
url = http://ftp.gnu.org/gnu/texinfo/texinfo-4.13.tar.gz
md5sum = 71ba711519209b5fb583fed2b3d86fcb
configure-options =
  --disable-static
environment =
  CFLAGS=-I${ncurses:location}/include
  LDFLAGS=-L${ncurses:location}/lib -Wl,-rpath=${ncurses:location}/lib

[texinfo7]
recipe = slapos.recipe.cmmi
shared = true
url = https://ftp.gnu.org/gnu/texinfo/texinfo-7.3.tar.xz
md5sum = 915a09fcdfc2bf0f5ecf9e556d5698ff
configure-options =
  --disable-static
environment =
  CFLAGS=-I${ncurses:location}/include
  LDFLAGS=-L${ncurses:location}/lib -Wl,-rpath=${ncurses:location}/lib
  PATH=${perl:location}/bin/:%(PATH)s
