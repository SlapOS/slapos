[buildout]
extends =
  ../nodejs/buildout.cfg
  buildout.hash.cfg

parts =
  opencode

[package-lock.json]
recipe = slapos.recipe.build:download
shared = true
url = ${:_profile_base_location_}/${:_buildout_section_name_}

[opencode]
recipe = slapos.recipe.cmmi
shared = true
path = ${package-lock.json:location}
environment =
  TMPDIR=@@LOCATION@@/tmp
  PATH=${nodejs:location}/bin:%(PATH)s
pre-configure =
  echo '{"dependencies":{"opencode-ai":"^1.3.13"}}' > %(location)s/package.json
  cp ${:path}/package-lock.json %(location)s/package-lock.json
  cd %(location)s && ${nodejs:location}/bin/npm ci
configure-command = true
make-binary = true
make-target = 
post-install =
  mkdir -p %(location)s/bin
  cp %(location)s/node_modules/.bin/opencode %(location)s/bin/ || cp %(location)s/node_modules/opencode-ai/bin/opencode %(location)s/bin/ || true
  rm -rf %(location)s/node_modules/.cache 2>/dev/null || true
  rm -rf %(location)s/node_modules/.package-lock.json 2>/dev/null || true
