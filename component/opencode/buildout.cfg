[buildout]
extends =
  ../nodejs/buildout.cfg

parts =
  opencode


[nodejs]
<= nodejs-22.11.0

[opencode]
recipe = plone.recipe.command
location = ${buildout:parts-directory}/opencode 
command =
  export PATH=${nodejs:location}/bin:$PATH
  mkdir -p ${opencode:location}
  cd ${opencode:location} && \
  cp ${package-lock.json:location}/package-lock.json ${opencode:location}/package-lock.json
  echo '${package.json:content}' > ${opencode:location}/package.json
  ${nodejs:location}/bin/npm install 


[package-lock.json]
recipe = slapos.recipe.build:download
shared = true
url = ${:_profile_base_location_}/${:_buildout_section_name_}
md5sum = 22cf95a2b88e06d0c592e4e05f5472d9

[package.json]
content = {
    "dependencies": {
      "opencode-ai": "^1.3.13"
    }
  }
