[buildout]
extends =
  ../../component/git/buildout.cfg
  ../../component/golang/buildout.cfg


[restic-rest-server]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/restic/rest-server/releases/download/v0.14.0/rest-server-0.14.0.tar.gz
md5sum = 37f574fbd24c8621838d9f09e87598e6
configure-command = :
make-binary = go build -o @@LOCATION@@/bin/rest-server ./cmd/rest-server
make-targets =
environment =
  CGO_ENABLED=0
  PATH=${golang1.26:location}/bin:${git:location}/bin:%(PATH)s
