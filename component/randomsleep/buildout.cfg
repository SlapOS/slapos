#if 0 /* gcc -x c buildout.cfg */
[randomsleep]
recipe = slapos.recipe.build
location = ${buildout:bin-directory}/${:_buildout_section_name_}
install =
  import subprocess
  args = 'gcc', '-s', '-O2', '-o', location, '-x', 'c', '-'
  p = subprocess.Popen(args, stdin=subprocess.PIPE)
  p.communicate(options['source'].encode())
  retcode = p.wait()
  if retcode:
    raise subprocess.CalledProcessError(retcode, args)
source =
#endif
  #include <errno.h>
  #include <stdint.h>
  #include <stdio.h>
  #include <stdlib.h>
  #include <time.h>
  #include <unistd.h>
  int main(int argc, char *argv[]) {
    if (argc == 2) {
      char *endptr;
      long max_seconds = strtol(argv[1], &endptr, 0);
      if (errno) {
        perror(argv[1]);
        return 1;
      }
      if (!*endptr && max_seconds >= 0) {
        if (max_seconds) {
          struct timespec tv;
          clock_gettime(CLOCK_MONOTONIC, &tv);
          /* The following seed was adapted from the one in bash. */
          srandom(tv.tv_sec ^ (tv.tv_nsec << 1) ^ getpid() ^ (uintptr_t)&tv);
          uint64_t x = (uint64_t)max_seconds * random();
          tv.tv_sec = x >> 31;
          tv.tv_nsec = (x & INT32_MAX) * 1000000000 >> 31;
          nanosleep(&tv, NULL);
        }
        return 0;
      }
    }
    printf("usage: %s MAXSECONDS\n", argv[0]);
    return 1;
  }
