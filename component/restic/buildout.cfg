[buildout]
extends =
  ../../component/golang/buildout.cfg

parts =
  restic

[restic]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/restic/restic/releases/download/v0.19.0/restic-0.19.0.tar.gz
md5sum = 360e80c4548769b5687f0d8dd02831aa
configure-command = :
make-binary = go run build.go -o @@LOCATION@@/bin/restic
make-targets =
environment =
  PATH=${golang1.26:location}/bin:${git:location}/bin:%(PATH)s
