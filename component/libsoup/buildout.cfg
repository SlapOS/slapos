[buildout]
extends =
  ../glib/buildout.cfg
  ../libpsl/buildout.cfg
  ../libxml2/buildout.cfg
  ../meson/buildout.cfg
  ../nghttp2/buildout.cfg
  ../ninja/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../sqlite3/buildout.cfg

parts =
  libsoup

[libsoup]
recipe = slapos.recipe.cmmi
shared = true
url = https://download.gnome.org/sources/libsoup/3.4/libsoup-3.4.2.tar.xz
md5sum = cd8b0fc5d53331b9c0b5b22aabac4294
configure-command = ${meson:location}/bin/meson builddir --wrap-mode=nodownload --libdir=lib -Dprefix=@@LOCATION@@ -Dbrotli=disabled -Dtls_check=false
make-binary = ninja -C builddir
pkg_config_depends = ${glib:location}/lib/pkgconfig:${glib:pkg_config_depends}:${nghttp2:location}/lib/pkgconfig:${sqlite3:location}/lib/pkgconfig:${libxml2:location}/lib/pkgconfig:${libpsl:location}/lib/pkgconfig
environment =
  PATH=${pkgconfig:location}/bin:${ninja:location}/bin:%(PATH)s
  PKG_CONFIG_PATH=${:pkg_config_depends}

[libsoup2.4]
<= libsoup
url = https://download.gnome.org/sources/libsoup/2.72/libsoup-2.72.0.tar.xz
md5sum = 859380b76b51fb55d720daea3c76c945
