[buildout]
extends =
  ../golang/buildout.cfg

parts =
  fzf

[fzf]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/junegunn/fzf/archive/refs/tags/v0.70.0.tar.gz
md5sum = 7e2b37dd19a7559a0f8a405f05908a02
configure-command = 
  GO111MODULE=on CGO_ENABLED=0 ${golang:location}/bin/go build -ldflags="-s -w"
make-binary = /bin/true
make-options =
environment =
  PATH=${golang:location}/bin:%(PATH)s
post-install =
  mkdir -p %(location)s/bin
  cp fzf %(location)s/bin/
