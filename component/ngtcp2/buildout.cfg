[buildout]
extends =
  ../pkgconfig/buildout.cfg
  ../automake/buildout.cfg
  ../libtool/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../xz-utils/buildout.cfg

[ngtcp2]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/ngtcp2/ngtcp2/releases/download/v1.22.1/ngtcp2-1.22.1.tar.xz
md5sum = 0568b4d66106e9067705cef8ab9348fc
pre-configure =
  autoreconf -fisv -I ${libtool:location}/share/aclocal -I ${pkgconfig:location}/share/aclocal
  automake
  autoconf
configure-options =
  --enable-lib-only
environment =
  PATH=${autoconf:location}/bin:${automake:location}/bin:${libtool:location}/bin:${m4:location}/bin:${pkgconfig:location}/bin:${xz-utils:location}/bin:%(PATH)s
  PKG_CONFIG_PATH=${openssl-3.5:location}/lib/pkgconfig:${nghttp3:location}/lib/pkgconfig
  LDFLAGS=-Wl,-rpath=${openssl-3.5:location}/lib -Wl,-rpath=${nghttp3:location}/lib
