[buildout]
extends =
  ../perl/buildout.cfg
  ../libdb/buildout.cfg
parts =
  perl-BerkeleyDB

[perl-BerkeleyDB]
<= perl-CPAN-package
module = BerkeleyDB/BerkeleyDB
version = 0.66
md5sum = 873a489b9276b5ceb9841cf4f6dc2f24
extra-env = export BERKELEYDB_INCLUDE=${libdb:location}/include BERKELEYDB_LIB=${libdb:location}/lib LDFLAGS="-L${libdb:location}/lib -Wl,-rpath=${libdb:location}/lib" ;