# Opt-in modern jsonschema chain (>= 4.18). Extending this gets:
#   - the pure-Python jsonschema / jsonschema-specifications / referencing
#     wheels at coordinated versions, AND
#   - source-build of the rpds-py native extension that referencing pulls
#     in transitively (via component/rpds-py).
#
# stack/slapos.cfg keeps `jsonschema = 4.17.3:whl` as the legacy default;
# extending this component must happen AFTER the stack/slapos.cfg extend
# so this [versions] block wins.
#
# Note: slapos.cookbook's slapconfiguration.jsonschema recipe needs the
# referencing-aware shim from MR 2085 once jsonschema >= 4.18 is in
# scope. SRs that rely on cross-file $ref or nested-property defaults
# should ensure they ship a cookbook carrying that shim.

[buildout]
extends =
  ../rpds-py/buildout.cfg

[versions]
jsonschema = 4.23.0:whl
jsonschema-specifications = 2025.9.1:whl
referencing = 0.37.0:whl
rpds-py = 0.30.0
