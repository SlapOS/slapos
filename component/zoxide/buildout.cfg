[buildout]
extends =
  ../rust/buildout.cfg

parts =
  zoxide

[zoxide]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/ajeetdsouza/zoxide/archive/refs/tags/v0.9.9.tar.gz
md5sum = cbdb6400172bb882060d154829e7fa63
configure-command = 
  cargo build --release
make-binary = /bin/true
make-options =
environment =
  PATH=${rustc:location}/bin:${cmake:location}/bin:%(PATH)s
post-install =
  mkdir -p %(location)s/bin
  cp target/release/zoxide %(location)s/bin/
