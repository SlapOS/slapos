# Dovecot with Pigeonhole (Sieve + ManageSieve)
# https://pigeonhole.dovecot.org/
#
# Extends dovecot and builds pigeonhole into the same prefix in post-install.
# Use ${dovecot-pigeonhole:location} instead of ${dovecot:location} to get
# a dovecot that includes sieve/imapsieve plugins.

[buildout]
extends =
  ../dovecot/buildout.cfg

[pigeonhole-download]
recipe = slapos.recipe.build:download
shared = true
url = https://pigeonhole.dovecot.org/releases/2.3/dovecot-2.3-pigeonhole-0.5.20.tar.gz
md5sum = fb9e8ec76e952a08b382de96286667a2

[dovecot-pigeonhole]
<= dovecot
post-install =
  cp -r %(location)s/share/doc/dovecot/example-config/* %(location)s/etc/dovecot/
  tar xzf ${pigeonhole-download:target}
  cd dovecot-2.3-pigeonhole-0.5.20
  ./configure --with-dovecot=%(location)s/lib/dovecot --prefix=%(location)s LDFLAGS="-L${openssl:location}/lib -Wl,-rpath=${openssl:location}/lib -L${zlib:location}/lib -Wl,-rpath=${zlib:location}/lib -L%(location)s/lib -Wl,-rpath=%(location)s/lib"
  make -j4
  make install
