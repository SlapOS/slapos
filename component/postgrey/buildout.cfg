[buildout]
extends =
  ../perl/buildout.cfg
  ../perl-Net-Server/buildout.cfg
  ../perl-BerkeleyDB/buildout.cfg
  ../perl-NetAddr-IP/buildout.cfg
parts =
  postgrey

[postgrey]
recipe = slapos.recipe.build:download-unpacked
# Official URL gives 403, probably because of some bot detection measure:
# url = https://postgrey.schweikert.ch/pub/postgrey-${:version}.tar.gz
url = https://distfiles.alpinelinux.org/distfiles/v3.12/postgrey-${:version}.tar.gz
version = 1.37
md5sum = 2ef30f42ad84f00caf41c49b593b8e2a

[postgrey-perl]
recipe = slapos.recipe.template:jinja2
output = ${buildout:bin-directory}/${:_buildout_section_name_}
perl-bin = ${:output}
inc =
  ${perl-Net-Server:site_perl}:${perl-IO-Multiplex:site_perl}:${perl-BerkeleyDB:site_perl}:${perl-NetAddr-IP:site_perl}
inline =
  #!/bin/sh
  {% set inc = "${:inc}".split(':') %}
  exec ${perl:location}/bin/perl -T \
  {% for item in inc -%}{% if item %}  -I "{{ item }}" \
  {% endif %}{% endfor %}  "$@"
