[buildout]
extends =
  ../luajit/buildout.cfg
  ../meson/buildout.cfg
  ../cmake/buildout.cfg
  ../ninja/buildout.cfg

parts =
  neovim

[neovim]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/neovim/neovim/archive/refs/tags/v0.12.0.tar.gz
md5sum = 38af91274a8e671781ddcf8020e953ae
configure-command = true
make-options =
  CMAKE_BUILD_TYPE=Release
  CMAKE_INSTALL_PREFIX=@@LOCATION@@
  LUAJIT_PREFIX=${luajit:location}
  LUAJIT_LD=${luajit:location}/lib
environment =
  PATH=${luajit:location}/bin:${meson:location}/bin:${cmake:location}/bin:${ninja:location}/bin:${buildout:directory}/bin:%(PATH)s
