[buildout]
extends =
  ../autoconf/buildout.cfg
  ../automake/buildout.cfg
  ../glib/buildout.cfg
  ../libidn/buildout.cfg
  ../libmilter/buildout.cfg
  ../libtool/buildout.cfg
  ../m4/buildout.cfg
  ../patch/buildout.cfg
  ../perl/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../xz-utils/buildout.cfg
  ../defaults.cfg
parts = opendmarc

[opendmarc]
recipe = slapos.recipe.cmmi
shared = true
url = https://github.com/trusteddomainproject/OpenDMARC/archive/refs/tags/rel-opendmarc-1-4-2.tar.gz
md5sum = 658d951db84a0305b0c5d9312eff5b64
pre-configure = chmod -R +w . && autoreconf -vfi -I ${libtool:location}/share/aclocal -I ${pkgconfig:location}/share/aclocal -I ${automake:location}/share/aclocal
configure-options =
  --with-milter=${libmilter:location}
  --without-sql-backend
environment =
  PATH=${autoconf:location}/bin:${automake:location}/bin:${libtool:location}/bin:${m4:location}/bin:${patch:location}/bin:${perl:location}/bin:${pkgconfig:location}/bin:${xz-utils:location}/bin:%(PATH)s
  PKG_CONFIG_PATH=${glib:location}/lib/pkgconfig
  CPPFLAGS=-I${glib:location}/include/glib-2.0 -I${glib:location}/lib/glib-2.0/include -I${libidn:location}/include -I${libmilter:location}/include
  LDFLAGS=-L${glib:location}/lib -Wl,-rpath=${glib:location}/lib -L${libidn:location}/lib -Wl,-rpath=${libidn:location}/lib -L${libmilter:location}/lib -Wl,-rpath=${libmilter:location}/lib
  LIBS=-lsmutil -lsm -lpthread