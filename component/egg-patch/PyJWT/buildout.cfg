# Reusable mixin to apply the PyJWT egg patches that turn the upstream
# tarball into PyJWT-2.12.1+SlapOSPatched001 (py3) or
# PyJWT-1.7.1+SlapOSPatched001 (py2).
#
# Any zc.recipe.egg part that transitively installs PyJWT (i.e. has caucase
# in its dependency tree) must inherit this mixin via `<= pyjwt-egg-patches`,
# otherwise setuptools 67.8.0 rejects the unpatched pyjwt-2.12.1 pyproject.toml
# (it defines `project.license` twice: once as text, once as a file reference,
# which is no longer allowed).
#
# Consumer pattern:
#   [buildout]
#   extends = .../component/egg-patch/PyJWT/buildout.cfg
#
#   [my-eggs-part]
#   <= pyjwt-egg-patches
#   recipe = zc.recipe.egg
#   eggs = ...
#
# Under python2 the [pyjwt-egg-patches:python2] override is merged
# automatically, so the same `<= pyjwt-egg-patches` line suffices.
# patch-directory is a stored option so consumers that inherit via
# `<= pyjwt-egg-patches` can still resolve the patch path correctly.
# `${:_profile_base_location_}` is a per-section buildout intrinsic that
# is rebound when a section is reused via `<=`, so we capture it once
# here under a regular option name and reference that explicitly.
[pyjwt-egg-patches]
patch-directory = ${:_profile_base_location_}
PyJWT-patches =
  ${pyjwt-egg-patches:patch-directory}/no-license-in-pyproject.toml.patch#4603854bd1d15bdf0456d4447fc9fe47
PyJWT-patch-options = -p1

[pyjwt-egg-patches:python2]
# Debian python3-jwt 1.7.1-2+deb11u1 "crit"-header security backport,
# adapted for py2 syntax. See 49836560 for the py2 compatibility rework.
PyJWT-patches =
  ${pyjwt-egg-patches:patch-directory}/0001-Merge-commit-from-fork.patch#0553b2858c7e7be7388c3e19dc31a900
PyJWT-patch-options = -p1
