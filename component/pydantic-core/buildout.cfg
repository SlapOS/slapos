# pydantic-core is a Rust/maturin native extension. Source-build through
# the SlapOS toolchain rather than installing a precompiled wheel.

[buildout]
extends =
  ../maturin/buildout.cfg
  ../pkgconfig/buildout.cfg
  ../rust/buildout.cfg

parts =
  pydantic-core

[pydantic-core]
recipe = zc.recipe.egg:custom
setup-eggs =
  ${maturin:egg}
  typing_extensions
egg = ${:_buildout_section_name_}
environment = pydantic-core-env

[pydantic-core-env]
PATH = ${maturin-bin:location}/bin:${pkgconfig:location}/bin:${rustc:location}/bin:%(PATH)s
