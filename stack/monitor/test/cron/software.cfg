[buildout]
extends =
  ../../buildout.cfg
  ../../../../stack/slapos.cfg

parts =
  slapos-cookbook
  instance-template

[instance-template]
recipe = slapos.recipe.template
output = ${buildout:directory}/instance.cfg
inline =
  [buildout]
  extends =
    ${monitor2-template:output}

  parts =
    cron-failure
    cron-success

  eggs-directory = ${buildout:eggs-directory}
  develop-eggs-directory = ${buildout:develop-eggs-directory}
  offline = true

  [cron-failure]
  <= macro.cron-with-promise
  cron-entries = $${cron:cron-entries}
  name = failing
  time = daily
  command = cat failure

  [cron-success]
  <= macro.cron-with-promise
  cron-entries = $${cron:cron-entries}
  name = succeeding
  time = daily
  command = echo "success"
