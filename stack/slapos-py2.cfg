[buildout]
extends = slapos.cfg
# Provide Python2-compatible setuptools/pip/wheel eggs for the bootstrap
# subprocess. slapos.rebootstrap will install these sections and prepend
# their locations to sys.path when running the bootstrap with Python2,
# so that Python2-compatible eggs take precedence over the system eggs
# (which may require Python >= 3.x).
rebootstrap-prepend-eggs =
  rebootstrap-setuptools
  rebootstrap-pip
  rebootstrap-wheel

# python2's lxml needs an old gcc
[gcc]
max-version += 12.4

[python]
part = python2.7

[openssl]
<= openssl-1.1

# Download Python2-compatible setuptools for use during the rebootstrap.
# These wheels are only used to run the buildout bootstrap with Python2;
# the final installed versions come from the [versions:python2] pins below.
[rebootstrap-setuptools]
recipe = slapos.recipe.build:download-unpacked
shared = true
url = https://files.pythonhosted.org/packages/e1/b7/182161210a13158cd3ccc41ee19aadef54496b74f2817cc147006ec932b4/setuptools-44.1.1-py2.py3-none-any.whl
md5sum = a5d4ce18230f73d2973afa33b79110ec

[rebootstrap-pip]
recipe = slapos.recipe.build:download-unpacked
shared = true
url = https://files.pythonhosted.org/packages/27/79/8a850fe3496446ff0d584327ae44e7500daf6764ca1a382d2d02789accf7/pip-20.3.4-py2.py3-none-any.whl
md5sum = 428d963b355040908117fda68108ff5f

[rebootstrap-wheel]
recipe = slapos.recipe.build:download-unpacked
shared = true
# Avoid https://github.com/pypa/wheel/issues/331
url = https://files.pythonhosted.org/packages/00/83/b4a77d044e78ad1a45610eb88f745be2fd2c6d658f9798a15e384b7d57c9/wheel-0.33.6-py2.py3-none-any.whl
md5sum = dbe2600c72fb2b8c9b2904ce4925d79e

# Pin zc.buildout dependencies to Python2-compatible versions when the final
# buildout run uses Python2. The system Python3 uses the modern versions
# already pinned in slapos.cfg.
# Note: these are the last versions compatible with Python 2. The known
# security vulnerabilities are acknowledged; these packages are only used
# transiently during the rebootstrap subprocess (step 3), not in production.
[versions:python2]
setuptools = 44.1.1
pip = 20.3.4
# Avoid https://github.com/pypa/wheel/issues/331
wheel = 0.33.6
